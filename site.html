<title>ミノガセン — きょう、見逃せない一戦。高校野球 観戦ガイド</title>
<style>
:root{
  --bg:#F3F5EF; --surface:#FFFFFF; --ink:#1B2420; --muted:#5F6E64;
  --line:#D8DED4; --green:#1E4D3B; --green-ink:#1E4D3B; --crimson:#A5162C;
  --chip-bg:#E9EDE4; --score-bg:#1E4D3B; --score-ink:#F3F5EF;
  --mk:rgba(228,190,70,.5); --gold:#B8934A;
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#0E1512; --surface:#182019; --ink:#E7ECE4; --muted:#9AA89D;
    --line:#2A362D; --green:#2E5F4B; --green-ink:#8CC7AC; --crimson:#E5566B;
    --chip-bg:#212B23; --score-bg:#101B15; --score-ink:#D7E2D6;
  }
}
:root[data-theme="dark"]{
  --bg:#0E1512; --surface:#182019; --ink:#E7ECE4; --muted:#9AA89D;
  --line:#2A362D; --green:#2E5F4B; --green-ink:#8CC7AC; --crimson:#E5566B;
  --chip-bg:#212B23; --score-bg:#101B15; --score-ink:#D7E2D6;
  --mk:rgba(196,150,42,.38); --gold:#C9A45C;
}
:root[data-theme="light"]{
  --bg:#F3F5EF; --surface:#FFFFFF; --ink:#1B2420; --muted:#5F6E64;
  --line:#D8DED4; --green:#1E4D3B; --green-ink:#1E4D3B; --crimson:#A5162C;
  --chip-bg:#E9EDE4; --score-bg:#1E4D3B; --score-ink:#F3F5EF;
  --mk:rgba(228,190,70,.5); --gold:#B8934A;
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  margin:0; background:var(--bg); color:var(--ink);
  font-family:"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic Medium","Yu Gothic",system-ui,sans-serif;
  font-size:15.5px; line-height:1.85; font-feature-settings:"palt";
}
.serif{font-family:"Hiragino Mincho ProN","Yu Mincho","Noto Serif JP",serif}
a{color:inherit}
.wrap{max-width:860px; margin:0 auto; padding:0 20px}

/* ---- header ---- */
header.site{
  border-bottom:3px double var(--line); background:var(--surface);
}
header.site .wrap{padding-top:26px; padding-bottom:18px}
.site-tag{
  font-size:11.5px; letter-spacing:.22em; color:var(--crimson); font-weight:600;
}
/* 号外スタイル: 極太ゴシック×紅×前傾+影オフセットでスポーツ紙一面の勢いを出す */
h1.site-title{
  margin:2px 0 6px; font-size:38px; letter-spacing:.02em; line-height:1.2;
  font-family:"Hiragino Sans","Hiragino Kaku Gothic ProN",system-ui,sans-serif; font-weight:900;
  color:var(--crimson); display:inline-block; transform:skewX(-6deg); transform-origin:left bottom;
  text-shadow:2.5px 2.5px 0 rgba(0,0,0,.18);
}
.site-sub{font-size:13px; color:var(--muted); margin:0}

/* ---- date hero (spocale風: 大きな日付+前後送り) ---- */
.date-hero{
  display:flex; align-items:center; justify-content:space-between; gap:10px;
  background:var(--score-bg); color:var(--score-ink); border-radius:6px;
  margin:22px 0 10px; padding:10px 14px;
}
.date-hero .dh-nav{
  font:inherit; width:36px; height:36px; border-radius:50%; cursor:pointer; flex-shrink:0;
  border:1px solid rgba(255,255,255,.35); background:transparent; color:inherit;
  font-size:18px; line-height:1; display:flex; align-items:center; justify-content:center;
}
.date-hero .dh-nav:hover{background:rgba(255,255,255,.1)}
.date-hero .dh-nav:disabled{opacity:.25; cursor:default; background:transparent}
.date-hero .dh-center{display:flex; align-items:baseline; gap:8px; min-width:0}
.date-hero .dh-date{font-size:24px; font-weight:700; letter-spacing:.04em; font-variant-numeric:tabular-nums}
.date-hero .dh-dow{font-size:14px; opacity:.85}
.date-hero .dh-count{font-size:12.5px; opacity:.75; white-space:nowrap}

/* ---- date strip (曜日+日にちの2段チップ) ---- */
.datestrip{
  display:flex; gap:6px; margin:0 0 6px; padding:2px;
  overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none;
}
.datestrip::-webkit-scrollbar{display:none}
.datestrip button{
  font:inherit; cursor:pointer; flex-shrink:0; min-width:48px;
  display:flex; flex-direction:column; align-items:center; gap:0;
  padding:6px 9px 5px; border:1px solid var(--line); border-radius:6px;
  background:var(--surface); color:var(--ink);
}
.datestrip .dow{font-size:10.5px; color:var(--muted); letter-spacing:.08em; line-height:1.5}
.datestrip .dow.sat{color:#2B4B6F}
.datestrip .dow.sun{color:var(--crimson)}
.datestrip .dnum{font-size:17px; font-weight:700; line-height:1.25; font-variant-numeric:tabular-nums}
.datestrip button[aria-selected="true"]{background:var(--green); border-color:var(--green)}
.datestrip button[aria-selected="true"] .dow,
.datestrip button[aria-selected="true"] .dnum{color:#F3F5EF}

/* ---- tournament filter nav ---- */
.datenav{display:flex; gap:8px; margin:12px 0 6px; flex-wrap:wrap}
.datenav button{
  font:inherit; font-size:14px; padding:7px 18px; cursor:pointer;
  border:1px solid var(--line); background:var(--surface); color:var(--ink); border-radius:3px;
}
.datenav button[aria-selected="true"]{
  background:var(--green); color:#F3F5EF; border-color:var(--green); font-weight:600;
}
.day-note{font-size:12.5px; color:var(--muted); margin:0 0 14px}

.game-row{
  display:flex; align-items:center; gap:14px; padding:10px 4px;
  border-bottom:1px dotted var(--line); font-variant-numeric:tabular-nums;
}
.game-row .t{font-size:13px; color:var(--muted); width:46px; flex-shrink:0}
.game-row .card{flex:1; font-size:15px}
.game-row .score{
  font-size:14px; font-weight:600; letter-spacing:.04em; color:var(--green-ink); white-space:nowrap;
}
.game-row .win{font-weight:700}
.badge-r1{
  font-size:10.5px; color:var(--muted); border:1px solid var(--line);
  padding:1px 6px; border-radius:2px; margin-left:8px; white-space:nowrap;
}

/* ---- section labels (きょうの注目 / 全試合) ---- */
.sec-label{
  font-size:13px; font-weight:700; letter-spacing:.22em; color:var(--crimson);
  margin:30px 0 12px; display:flex; align-items:center; gap:12px;
}
.sec-label::after{content:""; flex:1; height:1px; background:var(--line)}
.sec-label.plain{color:var(--green-ink)}

/* ---- featured cards (注目試合ヒーロー: 先頭は全幅、以降は半幅) ---- */
.feat-grid{display:grid; grid-template-columns:1fr 1fr; gap:14px}
.feat-card{
  grid-column:span 2; display:block; text-decoration:none; position:relative; overflow:hidden;
  background:var(--surface); border:1px solid var(--line); border-radius:8px;
  padding:22px 26px 20px; box-shadow:0 6px 20px rgba(10,25,18,.07); transition:box-shadow .15s;
}
.feat-card.half{grid-column:span 1}
.feat-card:hover{box-shadow:0 9px 26px rgba(10,25,18,.13)}
.feat-card::before{content:""; position:absolute; left:0; top:0; bottom:0; width:4px; background:var(--crimson)}
.feat-card .f-meta{
  font-size:12px; color:var(--muted); letter-spacing:.05em; margin:0 0 10px;
  font-variant-numeric:tabular-nums;
}
.feat-card .f-meta b{color:var(--green-ink); font-size:13px; margin-right:8px}
.feat-card .f-hook{
  font-family:"Hiragino Mincho ProN","Yu Mincho",serif; font-size:19px; line-height:1.75;
  font-weight:600; margin:0; color:var(--ink);
}
.feat-card.half .f-hook{font-size:16px}
.feat-card .f-match{font-size:17px; font-weight:700; display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin:0 0 10px}
.feat-card .f-match .vs{font-size:12px; color:var(--muted); font-weight:400}
.feat-card .seed-badge{padding:2.5px 10px}

/* ---- all-games compact rows (時系列一覧) ---- */
.all-row{
  display:flex; align-items:baseline; gap:12px; padding:11px 4px;
  border-bottom:1px dotted var(--line); font-variant-numeric:tabular-nums;
  text-decoration:none; color:inherit;
}
a.all-row:hover{background:rgba(30,77,59,.05)}
.all-row .t{font-size:13px; font-weight:700; color:var(--green-ink); width:44px; flex-shrink:0}
.all-row .names{font-size:15.5px; font-weight:600; line-height:1.6}
.all-row .names .vs{font-size:12px; color:var(--muted); margin:0 6px; font-weight:400}
.all-row .st{color:var(--crimson); font-size:11px; font-weight:700; letter-spacing:.06em; white-space:nowrap}
.all-row .place{font-size:12px; color:var(--muted); margin-left:auto; text-align:right; flex-shrink:0}
.all-row .chev{color:var(--muted); font-size:15px; flex-shrink:0}

/* ---- detail page ---- */
.detail-head{
  color:var(--score-ink);
  background:
    radial-gradient(110% 85% at 50% -12%, rgba(255,255,255,.08), transparent 55%),
    repeating-linear-gradient(115deg, transparent 0 30px, rgba(255,255,255,.02) 30px 60px),
    var(--score-bg);
}
.detail-head .wrap{padding-top:30px; padding-bottom:48px}
.detail-head .crumb{font-size:12.5px; margin-bottom:20px}
.detail-head .crumb a{color:inherit; opacity:.75; text-decoration:none}
.detail-head .crumb a:hover{opacity:1}
.detail-head .round{font-size:12px; letter-spacing:.2em; opacity:.8; margin-bottom:18px; text-align:center}
.matchup{
  display:flex; align-items:center; justify-content:center; gap:clamp(14px,4vw,40px);
  margin-bottom:18px;
}
.matchup .side{display:flex; flex-direction:column; align-items:center; gap:10px; flex:1; max-width:240px}
.matchup .tname{
  font-size:clamp(16px,3.4vw,22px); font-weight:600; letter-spacing:.04em; text-align:center; line-height:1.35;
  font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
}
.matchup .vs-mark{
  width:34px; height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  font-size:14px; letter-spacing:0; flex-shrink:0; border:1px solid rgba(255,255,255,.35);
  font-family:"Hiragino Mincho ProN","Yu Mincho",serif; opacity:.9;
}
.seed-badge{
  font-size:10.5px; font-weight:700; letter-spacing:.1em; padding:2.5px 12px; border-radius:20px;
  white-space:nowrap;
}
.seed-badge.s1{background:var(--gold); color:#FFF}
.seed-badge.s2{background:#8C97A3; color:#FFF}
.seed-badge.s3{background:#A0714B; color:#FFF}
.seed-badge.ns{border:1px solid rgba(255,255,255,.4); color:rgba(255,255,255,.82)}
.detail-head .info{
  display:flex; gap:18px; flex-wrap:wrap; justify-content:center; font-size:13.5px; opacity:.9;
  font-variant-numeric:tabular-nums;
}
.detail-head .pick-badge{
  color:#F3F5EF; background:var(--crimson); font-size:11px; font-weight:700;
  letter-spacing:.1em; padding:2px 10px; border-radius:3px;
}

/* ---- lead hook card (straddles the hero/paper boundary, poster-style) ---- */
.lead-hook{
  max-width:720px; margin:-26px auto 0; padding:0 20px; position:relative; z-index:2;
}
.lead-hook .inner{
  background:var(--surface); border:1px solid var(--line); border-radius:8px;
  padding:22px 26px 20px; position:relative; overflow:hidden;
  box-shadow:0 8px 24px rgba(10,25,18,.14);
}
.lead-hook .inner::before{
  content:"「"; position:absolute; top:-18px; left:8px; font-size:88px; line-height:1;
  color:var(--crimson); opacity:.1; font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
  pointer-events:none;
}
.lead-hook .eyebrow{
  font-size:11px; font-weight:700; letter-spacing:.22em; color:var(--crimson); margin:0 0 8px;
}
.lead-hook p:not(.eyebrow){
  margin:0; font-size:17.5px; line-height:1.95; font-weight:600;
  font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
}

/* ---- profile cards ---- */
.profile-grid{display:grid; grid-template-columns:1fr 1fr; gap:14px; margin:0 0 14px}
@media (max-width:600px){ .profile-grid{grid-template-columns:1fr} }
.profile-card{
  background:var(--surface); border:1px solid var(--line); border-radius:6px; padding:18px 20px;
}
.profile-card .p-head{
  display:flex; align-items:center; gap:12px; margin-bottom:12px;
  padding-bottom:12px; border-bottom:1px solid var(--line);
}
.profile-card .p-name{
  font-size:17px; font-weight:700; letter-spacing:.03em;
  font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
}
.profile-card p{font-size:14px; margin:0 0 10px; line-height:1.8}
.profile-card p:last-child{margin-bottom:0}
.profile-card ul{font-size:13.5px; margin:0 0 10px; padding-left:18px}

/* ---- player cards ---- */
.player-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:0 0 14px}
@media (max-width:600px){ .player-grid{grid-template-columns:1fr} }
.player-card{
  background:var(--surface); border:1px solid var(--line); border-radius:6px; padding:16px 18px;
}
.player-card .pl-name{
  font-size:16px; font-weight:700; margin:0 0 4px; letter-spacing:.02em;
  display:flex; align-items:center;
}
.player-card .pl-name .dot{
  width:10px; height:10px; border-radius:50%; display:inline-block; margin-right:8px; flex-shrink:0;
}
.player-card .pl-meta{display:flex; gap:6px; flex-wrap:wrap; margin:0 0 10px}
.player-card .pl-meta span{
  font-size:11px; font-weight:600; color:var(--muted); background:var(--chip-bg);
  border-radius:3px; padding:2px 8px; letter-spacing:.04em;
}
.player-card ul{margin:0; padding-left:16px; font-size:13px; line-height:1.75; color:var(--ink)}
.player-card li{margin:3px 0}

/* ---- story lead paragraph ---- */
.lead-para{
  font-size:16.5px; line-height:2.0;
  font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
}

/* ---- comments (口コミ) ---- */
.comment-form{
  background:var(--surface); border:1px solid var(--line); border-radius:6px;
  padding:16px 18px; margin:0 0 16px;
}
.comment-form .team-pick{display:flex; gap:8px; flex-wrap:wrap; margin:0 0 10px}
.comment-form .team-pick label{cursor:pointer}
.comment-form .team-pick input{display:none}
.comment-form .team-pick span{
  display:inline-block; font-size:12px; font-weight:600; padding:4px 14px;
  border:1px solid var(--line); border-radius:20px; color:var(--muted);
  transition:all .12s;
}
.comment-form .team-pick input:checked + span{
  background:var(--tc, var(--green)); color:#F6F4EC; border-color:transparent;
}
.comment-form textarea{
  width:100%; font:inherit; font-size:14px; color:var(--ink); background:var(--bg);
  border:1px solid var(--line); border-radius:4px; padding:10px 12px; resize:vertical;
  min-height:64px; margin:0 0 10px;
}
.comment-form textarea:focus{outline:2px solid var(--green); outline-offset:-1px}
.comment-form .c-row{display:flex; gap:10px; align-items:center; flex-wrap:wrap}
.comment-form input[type="text"]{
  font:inherit; font-size:13.5px; color:var(--ink); background:var(--bg);
  border:1px solid var(--line); border-radius:4px; padding:7px 12px; width:180px;
}
.comment-form input[type="text"]:focus{outline:2px solid var(--green); outline-offset:-1px}
.comment-form button{
  font:inherit; font-size:14px; font-weight:700; cursor:pointer;
  background:var(--green); color:#F3F5EF; border:none; border-radius:4px; padding:8px 26px;
}
.comment-form button:hover{opacity:.9}
.comment-form .c-note{font-size:11.5px; color:var(--muted); margin:8px 0 0}
.comment-item{
  background:var(--surface); border:1px solid var(--line); border-radius:6px;
  padding:12px 16px; margin:0 0 10px;
}
.comment-item .c-head{
  display:flex; gap:10px; align-items:center; font-size:12px; color:var(--muted); margin:0 0 4px;
  font-variant-numeric:tabular-nums;
}
.comment-item .c-head .c-name{font-weight:700; color:var(--ink); font-size:13px}
.comment-item .c-head .c-team{
  display:inline-flex; align-items:center; gap:5px; font-size:11px; font-weight:600;
}
.comment-item .c-head .c-team i{width:8px; height:8px; border-radius:50%; display:inline-block}
.comment-item .c-head .c-del{
  margin-left:auto; cursor:pointer; border:none; background:none; color:var(--muted);
  font-size:14px; padding:2px 6px; line-height:1;
}
.comment-item .c-head .c-del:hover{color:var(--crimson)}
.comment-item .c-text{margin:0; font-size:14px; line-height:1.8; white-space:pre-wrap; word-break:break-word}
.c-empty{font-size:13px; color:var(--muted); padding:4px 2px 0}

/* ---- collapsible sources ---- */
details.sources-details{margin:0 0 14px}
details.sources-details summary{
  cursor:pointer; font-size:13px; color:var(--muted); font-weight:600;
  padding:8px 0; user-select:none;
}
details.sources-details summary:hover{color:var(--green-ink)}

/* ---- section header icons ---- */
article.report h2{display:flex; align-items:center; gap:9px}
article.report h2 svg{width:17px; height:17px; flex-shrink:0; stroke:var(--green-ink); fill:none; stroke-width:1.7; stroke-linecap:round; stroke-linejoin:round}

/* ---- story marker highlight ---- */
article.report .mk{
  font-weight:700;
  background:linear-gradient(transparent 58%, var(--mk) 58%);
  padding:0 1px;
}

/* ---- table zebra ---- */
article.report tr:nth-child(even) td{background:var(--chip-bg)}

article.report{max-width:720px; margin:0 auto; padding:10px 20px 60px}
article.report h2{
  font-size:16px; font-weight:600; letter-spacing:.1em; color:var(--green-ink);
  margin:44px 0 12px; padding:0 0 6px; border-bottom:2px solid var(--green);
}
article.report h3{
  font-size:15.5px; font-weight:700; margin:26px 0 6px; letter-spacing:.04em;
}
article.report p{margin:0 0 14px}
article.report ul{margin:0 0 14px; padding-left:22px}
article.report li{margin:4px 0}
article.report a{color:var(--green-ink); text-decoration-color:var(--line)}
article.report .sources{font-size:12.5px; color:var(--muted); line-height:1.9}
article.report .sources a{color:var(--muted)}
.broadcast-box{
  background:var(--chip-bg); border:1px solid var(--line); border-radius:4px;
  padding:14px 18px; margin:0 0 14px;
}
.broadcast-box p{margin:0 0 6px; font-size:12px; letter-spacing:.06em; color:var(--muted); font-weight:600}
.broadcast-box p:first-child{margin-top:0}
.broadcast-box ul{margin:0 0 14px; padding-left:0; list-style:none}
.broadcast-box ul:last-child{margin-bottom:0}
.broadcast-box li{display:flex; align-items:center; gap:8px; padding:4px 0; font-size:14px}
.broadcast-box a{font-weight:600}
.tag{
  display:inline-block; font-size:10.5px; font-weight:700; letter-spacing:.04em;
  color:var(--score-ink); background:var(--green); border-radius:3px; padding:2px 7px;
  line-height:1.5; white-space:nowrap;
}
.video-embed{margin:0 0 20px}
.video-frame{position:relative; padding-bottom:56.25%; height:0; overflow:hidden; border-radius:4px; background:var(--chip-bg)}
.video-frame iframe{position:absolute; top:0; left:0; width:100%; height:100%; border:0}
.video-caption{margin:8px 0 0; font-size:13px; color:var(--muted); line-height:1.7}
.video-caption strong{color:var(--ink)}
.video-link-card{
  border:1px solid var(--line); border-radius:4px; padding:12px 16px; margin:0 0 14px;
}
.video-link-card a{font-weight:600}
.video-link-card p{margin:6px 0 0; font-size:13px; color:var(--muted)}
.tablewrap{overflow-x:auto; margin:0 0 14px}
article.report table{
  border-collapse:collapse; font-size:13.5px; font-variant-numeric:tabular-nums;
  min-width:480px; width:100%;
}
article.report th{
  text-align:left; font-weight:600; color:var(--muted); font-size:12.5px;
  padding:6px 10px; border-bottom:2px solid var(--green); white-space:nowrap;
}
article.report td{padding:7px 10px; border-bottom:1px solid var(--line); vertical-align:top}
.backlink{
  display:inline-block; margin:34px 0 0; font-size:13.5px; text-decoration:none;
  color:var(--green-ink); font-weight:600; border:1px solid var(--line);
  padding:8px 16px; border-radius:3px;
}
.backlink:hover{border-color:var(--green)}

/* ---- footer ---- */
footer.site{
  border-top:3px double var(--line); margin-top:50px; padding:22px 0 40px;
  font-size:12px; color:var(--muted);
}
footer.site p{margin:4px 0}
/* ---- mobile (index.htmlのviewportメタ、またはArtifactラッパー経由で発火) ---- */
@media (max-width:600px){
  .wrap{padding:0 16px}
  header.site .wrap{padding-top:20px; padding-bottom:14px}
  h1.site-title{font-size:28px}
  .datenav{
    flex-wrap:nowrap; overflow-x:auto; -webkit-overflow-scrolling:touch;
    margin-left:-16px; margin-right:-16px; padding:2px 16px 8px; scrollbar-width:none;
  }
  .datenav::-webkit-scrollbar{display:none}
  .datenav button{flex-shrink:0; white-space:nowrap; padding:7px 14px}
  .date-hero{margin-top:16px; padding:8px 10px}
  .date-hero .dh-date{font-size:21px}

Bシード校。2026年春季千葉県大会は準々決勝で東京学館浦安に4-5、延長10回タイブレークの末に惜敗した。2025年秋・2023年秋の両大会でベスト8進出。指揮を執る高倉伸介監督は1993年夏の三重大会決勝で三重高の投手として海星に0-1で敗れ、甲子園出場を逃した経歴を持つ。名城大卒業後は母校三重でコーチ・監督を経験し、皇学館では未経験だったバドミントン部を3年で男女インターハイ出場に導いた異色の指導者だ。千葉黎明でのコーチを経て2017年に千葉学芸監督へ就任。就任当初は部員14人、初陣は竜ヶ崎一に0-30の完敗だったが、そこから力をつけ2021年春季千葉県大会では決勝で専大松戸を破り初優勝を果たした。屋根付きブルペン・打席練習場・ウェイトルーム・ピッチングマシンを完備し、寮「創勇寮」で生活面もサポートする体制を敷く。OBには2021年ドラフト2位で日本ハムに入団した有薗直輝がおり、高校通算70本塁打を誇るスラッガーは学校創部以来初のプロ野球選手となった。2021年春の県大会初優勝時には主軸として活躍している。

### 日体大柏
ノーシード。夏の大会1回戦では鎌ケ谷と対戦し、延長10回サヨナラの末3-2で勝利して2回戦進出を決めた。部の最高成績は2012年(第94回)千葉大会準優勝で、当時の校名は柏日体。2019年秋に監督へ就任すると、2021年からは主将を8人任命する日替わり制度を導入し、部の雰囲気を変えてきた。野球部以外にもサッカー部が全国高校サッカー選手権に初出場ながらベスト8進出を果たすなど、部活動全般が盛んな校風で知られる。

## 過去の対戦成績
2023年7月12日、第105回大会2回戦(ゼットエーボールパーク)で両校は対戦し、千葉学芸が4-2で日体大柏を下している。日体大柏はこの年も1回戦で佐倉西に9-0で快勝してからの2回戦敗退で、2026年も1回戦(鎌ケ谷に3-2)を突破しての2回戦進出という、3年前と同じ勝ち上がりの構図での再戦となる。

## 今大会の状況
第108回全国高等学校野球選手権千葉大会。千葉学芸はBシード校として登場。日体大柏はノーシードながら1回戦で鎌ケ谷を延長10回サヨナラの末3-2で下し、勢いをつけて2回戦へ駒を進めてきた。

## ストーリー・見どころ
この2回戦は、単なる組み合わせの巡り合わせではない。3年前の2023年夏、同じ2回戦の舞台で日体大柏は千葉学芸に4-2で敗れている。当時も日体大柏は1回戦を大勝で突破しての2回戦敗退だった。2026年も1回戦を延長サヨナラで勝ち上がっての2回戦進出と、勝ち上がり方まで酷似した構図での再戦となる。ノーシードから勢いに乗る日体大柏にとって、これは3年越しのリベンジマッチと言っていい一戦だ。

千葉学芸を率いる高倉伸介監督のキャリアもこの一戦に厚みを与える。自身も選手として甲子園を逃した経験を持ち、バドミントンという畑違いの競技でもインターハイに導いた指導実績を引っさげて2017年に就任。部員14人、初陣0-30という屈辱的なスタートから、わずか数年で県大会優勝校へとチームを押し上げてきた。その積み重ねの延長線上に、プロ野球選手・有薗直輝を輩出したという事実がある。

一方の日体大柏を率いる伊藤太一監督も、営業マンという畑違いの職を経てグラウンドに戻ってきた変わり種だ。就任後に打ち出した「主将8人制」は、リーダーを一人に固定しないという発想の転換であり、チームの一体感を生む狙いがあった。1回戦の鎌ケ谷戦を延長サヨナラで制した勝負強さは、その積み上げの成果とも読める。

Bシードの貫禄を見せたい千葉学芸と、ノーシードから波に乗る日体大柏。3年前の借りを返したい日体大柏にとっても、連続してベスト8進出中の千葉学芸にとっても、譲れない一戦になりそうだ。

### 拓大紅陵
甲子園に春夏合わせて9回出場し、1992年夏には準優勝を果たした千葉の伝統強豪校。最後の甲子園出場は2004年春で、2026年は22年ぶりの聖地奪回を狙う。2025年春季千葉県大会でベスト4に進み、Aシードを獲得しての臨戦。部は基本的な生活習慣と人格形成を重視し、文武両道を実践する校風で知られる。

指揮を執るのは坂巻展行監督。同校が甲子園に初出場した1984年春、そして連続出場となった同年夏の主将を務めた人物で、2023年秋に監督へ就任した。30年以上にわたりチームを率い1992年夏の準優勝を率い、U-18日本代表監督も務めた故・小枝守元監督の下で指導者としての礎を築いている。

### 東海大市原望洋
甲子園に春夏合わせて3回出場。2010年春に初出場を果たし、最高成績は2回戦。「グラウンド内では上下関係なく、全員が全力でプレー」するチームワーク重視のスタイルを特徴とする。近年は秋季千葉県大会でベスト8前後の成績を続けており、今大会は1回戦で船橋啓明を10-0で破って2回戦に進出した。

## ストーリー・見どころ
拓大紅陵にとって今夏は特別な意味を持つ。1992年夏の準優勝を最後に、2004年春を最後に甲子園から遠ざかって22年。指揮官の坂巻展行監督は、その1984年春夏連続出場のときのキャプテンであり、名将・小枝守元監督の薫陶を受けた人物。恩師が築いた歴史を、かつての主将が指揮官として塗り替えようとする22年越しの挑戦が、この夏始まる。

その道のりは決して平坦ではなかった。近年の拓大紅陵は秋季千葉県大会で3度の準優勝を経験しながら、いずれも関東大会初戦で姿を消している。さらに昨夏の第107回大会では優勝候補と目されながら3回戦で1点差で敗れた。2019年の3回戦では東海大市原望洋に7-3で退けられており、その相手と再びまみえる巡り合わせとなった。

対する東海大市原望洋は、1回戦で船橋啓明を10-0の大差で下して勢いに乗る。甲子園出場3回、チームワークを重視し「上下関係なく全員が全力でプレー」する校風のもと、堅実な守備陣を軸に勝ち上がってきた。三塁の髙山拓翔、遊撃の金森優来、中堅の長部碧と、内野・外野に安定感のある選手が並ぶ。

舞台となるADEKA袖ケ浦球場は、木更津市の拓大紅陵と市原市の東海大市原望洋、双方にとって至近の内房エリア。地元の応援団を大挙引き連れての一戦になることが予想され、特に大応援団が名物の拓大紅陵にとってはホームに近い雰囲気での戦いとなる。

投げては最速141km/hを誇る二刀流・宮澤和聖を擁する拓大紅陵と、堅い守りで勝ち上がる東海大市原望洋。22年ぶりの甲子園を目指す伝統校が、7年前に土をつけられた相手にどう挑むか。夏の入り口を占う一戦から目が離せない。

これまでにプロ野球選手を4人輩出している伝統校でもある。捕手・相川亮二(1994年ドラフト5位で横浜入団、通算23年1150安打)、投手・石井弘寿(1995年ドラフト4位でヤクルト入団、通算27勝15敗・防御率2.66)、投手・島崎毅(1991年ドラフト4位で日本ハム入団、通算20勝19敗)、そして内野手・粟飯原龍之介(2021年ドラフト3位でDeNA入団、高校通算33本塁打)と、投打にプロで実績を残したOBが名を連ねる。

### 東京学館浦安

投手力を軸にしたチームで、エース大家雅史の存在感が大きい。試合中にフォームを修正できる高い野球IQとスタミナが評価されており、この夏の台風の目として注目されている。

## 今大会の状況
第108回全国高等学校野球選手権千葉大会は、7月4日にZOZOマリンスタジアムで開会式(式典のみ)が行われ、7月9日から熱戦が始まった。組み合わせ抽選は6月11日に実施され、165校148チーム(連合24校7チーム)が参加。準決勝は7月24日、決勝は7月26日午前10時からいずれもZOZOマリンスタジアムで行われる。

対象の一戦は2回戦、7月11日11:15開始の第2試合として京葉ガスクラシモスタジアム浦安で行われる。両校とも1回戦を突破しており、東京学館は市川南を7-0で下して勝ち上がった。Aシードの東京学館浦安も1回戦を制して2回戦進出を決めている。

## ストーリー・見どころ
この2回戦、実は単なる対戦カード以上の意味を持つ。東京学館と東京学館浦安はいずれも学校法人鎌形学園が運営する姉妹校で、いわば「学館ダービー」。同じ学校法人のもとで育った両校が公式戦のマウンドで相まみえるという、千葉大会でもそうそう見られない一戦だ。

舞台となる京葉ガスクラシモスタジアム浦安は、東京学館浦安の地元・浦安市内にある球場。校舎も同じ浦安市内にあり、エース大家雅史は浦安リトルシニアの出身でもある。地元で育った右腕が、地元の球場で全国切符をかけて投げる一戦となる。

東京学館浦安にとって、甲子園はまだ見ぬ景色だ。2018年の第100回記念大会では西千葉大会で決勝まで勝ち上がり、準決勝では市立船橋相手に9回裏2死満塁からのサヨナラ勝ちという劇的な展開で勝ち抜いたが、決勝で中央学院に敗れ、あと一歩のところで夏の甲子園切符を逃した過去がある。今年はAシードの座を手にし、春は専大松戸相手に1点差まで迫っただけに、雪辱と悲願の両方を懸けた夏になる。

対する東京学館は、2022年から2024年にかけて3年連続でベスト8以上に進出してきた実力校。今年もノーシードながら1回戦を7-0の完勝で突破しており、勢いは十分。投手力で勝負する東京学館浦安に対し、どう食らいつくかが焦点となる。プロ野球選手を4人輩出してきた伝統と、大家雅史という好投手を擁する後輩校との一戦は、千葉大会の中でも異色の注目カードとなりそうだ。

## 両校プロフィール

### 千城台
千葉市若葉区千城台西に所在する県立高校で、現在48期生が活動する。第108回千葉大会1回戦では野田中央を10-0の大差で下し、2回戦へ駒を進めた。近年は2023年夏の2回戦で八千代松陰と対戦した記録があり、2025年秋の地区予選敗者復活1回戦では同じ八千代松陰に1-5で敗れている。

野球部OB会は後輩支援に力を入れ、会費3,000円で運営を続けてきた。OBの佐藤友紀投手(40期)は高校時代、公式戦の勝利は秋にわずか1勝のみ、最後の夏は東海大市原望洋に大敗し、球速表示のある球場で投げた経験すらない無名の右腕だった。秀明大進学後にサイドスローへ転向して球速を伸ばし(大学3部リーグで最速143km→現在152km)、独立リーグ・茨城アストロプラネッツを経てハヤテベンチャーズ静岡入り。2026年7月27日開催のナミックス フレッシュオールスターゲーム(HARD OFFエコスタ新潟)にパ・リーグ選抜投手として選出されている。

### 千葉黎明
八街市の千葉黎明高校は、2024年秋季千葉県大会決勝で拓大紅陵を8-7で破って初優勝を果たすと、秋季関東大会でもベスト4に進出し、3年連続出場中だった山梨学院を破ってセンバツ当確を掴んだ。第97回選抜大会で甲子園初出場を果たしたが、初戦で智弁和歌山に0-6で敗れている。今夏の千葉大会にはBシードとして臨む。

指揮を執る中野大地監督は拓大紅陵OBの捕手で2004年センバツ出場経験を持ち、明治大では野村祐輔(元広島)とバッテリーを組んだ経歴の持ち主。日産自動車、JFE東日本でプレーした後、2021年12月に千葉黎明の監督に就任し、就任4年目でセンバツ初出場に導いた。恩師である拓大紅陵の名将・小枝守氏(2019年死去)の妻から譲り受けたハンカチを公式戦では必ずポケットに忍ばせ、タオルをベンチに入れて戦う。「小枝さんはいつもどこかにいる」と語る。

## 今大会の状況
第108回千葉大会は7月9日開幕、決勝は7月26日にZOZOマリンスタジアムで行われる。千葉黎明は2026年春季千葉県大会の成績によりBシードに入り、1回戦を免除されている。千城台は1回戦で野田中央に10-0で勝利し2回戦へ進出。両校は同じブロックに組み込まれており、この2回戦を突破した先にはノーシードの強豪・木更津総合も控える厳しい山となっている。対象試合は7月11日11時15分、千葉県総合スポーツセンター野球場で行われる。

## ストーリー・見どころ
片やBシードで臨む千葉黎明、片や1回戦を白星発進で乗り越えてきた千城台。ノーシードから勢いに乗るチームとシード校がぶつかる2回戦は、夏の大会らしい下剋上の匂いを漂わせる一戦だ。

千葉黎明のベンチには、この夏も一枚のハンカチがある。中野大地監督が恩師・小枝守氏の妻から譲り受けた形見で、公式戦では必ずポケットに忍ばせ、タオルもベンチに置いて戦ってきた。その中野監督が2024年秋、母校でもある拓大紅陵を決勝で破って掴んだ初優勝がセンバツ初出場への道を開き、今夏はBシードとしてこの千葉大会に立つ。今大会Aシードの拓大紅陵とはまだ距離があるが、勝ち上がればいずれ再びまみえる可能性も残る組み合わせだ。

一方の千城台には、まだ見ぬ栄光を追う卒業生の存在がある。OBの佐藤友紀は高校時代、公式戦の白星はわずかに秋の1勝、最後の夏は大敗で終えた無名の投手だった。それが大学でサイドスローに転向し、独立リーグを経てプロの舞台へ。この2回戦から約2週間後の7月27日には、パ・リーグ選抜投手としてフレッシュオールスターゲームのマウンドに立つ。「高校で無名でも終わりではない」というメッセージは、1回戦を10-0で快勝したばかりの現役ナインの背中を押すだろう。

千葉県総合スポーツセンター野球場で11時15分、シード校の壁に挑む千城台と、初のセンバツから夏へ勢いをつなげたい千葉黎明との対戦が始まる。

## 両校プロフィール

### 四街道

千葉県立高校で、甲子園出場歴はない。2025年夏の第107回選手権大会は準々決勝で習志野に3-5で敗れたものの、8強まで勝ち上がった実績を持つ。指揮を執るのは古谷健監督。県立成田国際でも指導実績を積んできた。部員数は86名(3年13名、2年30名、1年33名、マネージャー10名)で、野球初心者も積極的に受け入れる方針。木製バットの導入や投手ローテーション制など柔軟な指導が特色で、人間力の育成を重視するチームカラーを持つ。昨秋の千葉県大会は2回戦で敗退。今春の千葉県大会は地区予選代表決定戦で千葉英和に1-3で敗れ、県大会出場を逃した。

### 専大松戸

私立の進学校(普通科E類型、偏差値72)で、甲子園出場歴は通算6回(2015年夏に初出場、2021年春夏、2023年春夏、2026年春)。2026年春の千葉県大会では史上初の4連覇を達成し、決勝で東京学館浦安を相手に4-3で逆転サヨナラ勝ち。続く選抜大会ではベスト4に進出した。特別強化指定部で、寮は持たず県外出身選手も自宅から通う。率いるのは持丸修一監督(78歳)。竜ヶ崎一、藤代、常総学院、そして専大松戸と、これまでに4校を甲子園に導いてきた名将で、2026年春の選抜では77歳での勝利という史上最高齢記録を樹立しながら同校を初の4強に押し上げた。メンバーは千葉県内の中学出身者が16名を占める。

## 過去の対戦成績

両校は2021年9月21日、秋季千葉県大会2回戦の柏の葉公園野球場で対戦しており、四街道が6-5で専大松戸を破っている。四街道は5回を終えて0-5とリードを許していたが、6回に一挙6点を奪って逆転。9回1死二塁のピンチでは、マウンドの鶴岡汰一投手(当時2年)が自らベンチに申告敬遠を進言し、好打者を歩かせてリードを守り切った。

## 今大会の状況

専大松戸は2026年春季千葉県大会優勝の実績によりAシード1番手に位置付けられ、2回戦が今大会の初戦となる。一方の四街道はシード外からの出場。1回戦では天羽を27-0の5回コールドで下し、久保田選手のランニング本塁打も飛び出す大勝で勢いに乗る。四街道が勝ち上がったことで、専大松戸の初戦相手として組み合わせが決まった。シード外から勝ち上がってきた四街道が、センバツ4強入りの優勝候補・専大松戸にいきなり挑む一戦となる。

## ストーリー・見どころ

柏の葉公園野球場で迎える四街道vs専大松戸戦は、組み合わせの妙以上の因縁を秘めている。5年前の2021年秋、同じ柏の葉の地で両校は一度ぶつかっており、四街道が0-5のビハインドから一挙6点を奪って専大松戸を逆転、6-5で下した記録が残る。今大会もシード外の四街道がセンバツ4強・優勝候補の専大松戸に挑む構図で、あの日のような波乱を起こせるかが最大の見どころとなる。

専大松戸は2026年春の千葉県大会で史上初の4連覇を達成し、続く選抜大会でもベスト4進出。持丸修一監督は77歳での勝利という史上最高齢記録を打ち立てながら、チームを歴史的な結果に導いた。エースの門倉昂大は選抜で4試合に登板し3勝1敗、防御率0.66という圧巻の内容。4番捕手・吉岡伸太朗の勝負強い打棒も含め、隙のない布陣で夏連覇へ向かう。

対する四街道は、木製バット導入や投手ローテーション制など独自色のある指導で力をつけてきた古谷健監督のもと、初心者からの育成にも力を入れる県立校。1回戦は天羽を27-0の5回コールドで一蹴し、上々の仕上がりを見せている。今春の千葉県大会は地区予選で敗れて出場を逃しており、夏での巻き返しに懸ける一戦でもある。

格上との一戦を前に、鍵を握るのは四街道の投手陣。最速143キロを誇る福永竜基が専大松戸打線をどこまで抑え込めるかが試合の趨勢を左右しそうだ。守っては岡田幸大の俊足強肩が生きる場面も期待される。優勝候補を苦しめた5年前の記憶を持つ四街道が、再び金星をつかめるか。柏の葉公園に注目が集まる一戦だ。

## 両校プロフィール

### 八千代松陰
甲子園出場は1980年春(初出場・1回戦敗退)と1998年夏(1回戦敗退)の2度のみ。以来、聖地から遠ざかる時期が続いていたが、近年は着実に力をつけてきた。2025年夏の千葉大会では市立船橋との決勝で4点のリードを守りきれず、延長10回タイブレークの末サヨナラ負けの準優勝。2026年春季千葉県大会ではベスト4進出を果たすと、23年ぶりとなる関東大会出場権をかけた代表決定戦に進み、夏の第108回大会ではAシードに指定された。

19時完全下校という限られた練習時間の中で結果を出すのが持ち味。兼屋辰吾監督は「どうなりたいのか、何を目指すのかを伝える」指導方針を掲げ、この2年でプロ野球選手を2人輩出している(清宮虎多朗・2018年楽天育成1位、長岡秀樹・2019年ヤクルト5位)。

### 千葉経大付
甲子園では2004年夏と2008年春(第80回選抜)にベスト4進出という最高成績を残し、ベスト4常連校として名を馳せた時代がある。しかし2008年を最後に聖地から遠ざかっている。2026年は春季県大会・夏の大会ともにシード校選出を逃したが、夏の第108回大会1回戦では袖ケ浦に9-1で快勝し2回戦へ駒を進めた。

千葉県内では「私学の強豪」として認識される存在で、攻守にバランスの取れた陣容が特徴。2004年・2008年のベスト4実績は今も同校野球部の誇りとなっている。

## 今大会の状況
第108回全国高等学校野球選手権千葉大会は165校148チーム(連合24校7チーム)が参加。7月4日にZOZOマリンスタジアムで開会式を行い、7月9日に開幕した。決勝は7月26日、準決勝は7月24日でともにZOZOマリンスタジアム開催。優勝候補の本命は2026年春季大会覇者で4年連続シードの専大松戸とされる。

八千代松陰は春季ベスト4の実績を引っさげたAシードとして登場。一方の千葉経大付はシード外からの出発となったが、1回戦で袖ケ浦に9-1と圧勝し波に乗っている。シードと非シードの対戦となる今回の2回戦は、今大会前半の注目カードのひとつだ。

## ストーリー・見どころ
舞台は成田市の「なごみの米屋ぴーちゃんフィールド大谷津野球場」。老舗羊羹店・なごみの米屋がネーミングライツを取得し、看板商品「ぴーなっつ最中」のキャラクターが球場名に刻まれたこの地で、Aシードと1回戦快勝組がぶつかる。

八千代松陰にとって、この夏は雪辱の一年だ。昨夏は市立船橋との決勝で4点のリードを守りきれず、延長タイブレークの末にサヨナラ負け。悔しさを胸に迎えた今春の県大会ではベスト4に進出。23年ぶりとなる関東大会出場権をかけた代表決定戦に進み、地力の向上を証明してみせた。19時完全下校という制約の中でプロ野球選手を2年連続で輩出してきた指導力も、この夏さらなる結果で示したいところだ。

対する千葉経大付は、2004年夏・2008年春と2度のベスト4進出を誇る古豪。ただし2008年を最後に聖地から遠ざかっており、今大会もシード外からの挑戦となった。それでも1回戦で袖ケ浦を9-1と一蹴し、上々の滑り出し。私学の強豪としてのプライドを取り戻すべく、勢いに乗って2回戦に臨む。

両軍を率いる指揮官にも見逃せない共通点がある。八千代松陰の兼屋辰吾監督は沖縄尚学出身で、母校は昨夏の全国選手権を制したばかり。一方の千葉経大付・松崎将監督は山梨学院で部長を務めた経歴を持ち、母校は2023年センバツで全国制覇を果たしている。全国王者の血を引く指揮官同士の采配勝負も、この一戦の隠れた見どころだ。

さらに選手面でも縁がある。千葉経大付の宇都宮颯二郎は八千代市立村上東中の出身。実はこの中学は、八千代松陰の石塚太惺の兄で読売ジャイアンツのドラフト1位・石塚裕惺の母校でもある。相手のお膝元で育った選手が敵として乗り込む構図も、この試合に独特の緊張感を添えている。

## 両校プロフィール

### 県千葉
千葉県立千葉高等学校。甲子園出場歴は6回、すべて夏の大会で1931年に初出場し、1953年まで出場を重ねた。最高成績は1936年の準々決勝進出で、通算成績は2勝6敗。1953年を最後に甲子園から遠ざかって70年以上が経つ。

県下随一の公立進学校であり、野球推薦ではなく一般受験を経て入学した選手も部に在籍する。第108回千葉大会1回戦(7月9日)では我孫子二階堂を相手に9-0、7回コールドで勝利。エース左腕・加賀谷一が3回2/3を無安打8奪三振に抑える力投を見せ、2回戦進出を決めた。

### 市松戸
松戸市立松戸高等学校。甲子園出場歴はなし。今大会はCシード校として、2026年春季県大会での実績を評価されての登場となる。

2023年・2024年の県大会では3回戦まで進出。「成り得る最高の自分に成る」を不動の理念に掲げ、「想」「乾坤一擲」をビジョンとして練習に取り組む。主将を2人置くダブル主将制でチームをまとめているのも特色だ。

## 今大会の状況
第108回全国高等学校野球選手権千葉大会。組み合わせ抽選ではシードなしの県千葉に対し、市松戸はCシード校の一角に名を連ねた。

県千葉は1回戦で我孫子二階堂を9-0の7回コールドで下し、順当に勝ち上がった。エース加賀谷一が無安打8奪三振という圧巻の内容で試合を作った点が光る。無印校としてシード校・市松戸との対戦に臨む格好となり、2回戦は7月13日8:45開始で組まれている。

## 注目選手

### 加賀谷一(県千葉・投手・3年)
- 昨年度成績: 春季大会で20奪三振
- 今大会成績: 千葉大会1回戦で3回2/3を無安打無失点、8奪三振
- 最速142キロの左腕。「県千葉のドクターK」の異名を持ち、医学部(国立大および慶應大)進学を志望する
- 母は外科医。家事や家族の世話をこなしながら当直にも入り、弱音を吐かない姿に憧れて医学部志望を固めたという
- 2025年12月には千葉県選抜メンバーに選出され台湾遠征を経験

## ストーリー・見どころ
無印で挑む進学校と、シードを背負う公立校の一戦。県千葉のマウンドに立つ加賀谷一は、最速142キロを誇る左腕でありながら医学部進学を見据える異色の存在だ。多忙な外科医の母親が弱音ひとつ吐かず家庭と仕事を両立させる姿を間近で見て育ったという背景は、この夏にかける覚悟にも重なる。1回戦では我孫子二階堂を相手に3回2/3を無安打無失点、8奪三振という圧巻の内容を披露しており、その実力は2025年12月の千葉県選抜メンバー入り・台湾遠征という形でも裏付けられている。

迎え撃つ市松戸は甲子園出場こそないものの、選手を伸ばす土壌には確かなものがある。2021年には瀧本将生投手が同校史上初のNPBドラフト指名(ソフトバンク育成11位)を受け、2024年には内野手・広瀬結煌がソフトバンクから育成4位で指名された。いずれも決して華々しい経歴からの指名ではなく、地道な努力が実を結んだ選手たちだ。プロへの道を切り拓く指導力を持つ市松戸に対し、進学校ながら好投手を擁する県千葉がどう立ち向かうか。

Cシード校としての自覚と、無印から勝ち上がってきた挑戦者・県千葉の勢い。立場の異なる両者が、どちらの色を出せるかが試合の鍵を握る。

コールド勝ちで波に乗る県千葉のエースがシード校打線をどこまで抑え込めるか、そして市松戸がその左腕をどう攻略するか。進学校と公立校、それぞれが異なる道でこの夏を戦う姿に注目したい一戦だ。

## ストーリー・見どころ
Cシードの千葉商大付に、非シードながら初戦を快勝で突破した京葉工が挑む一戦。春季大会でベスト8まで勝ち上がった実力校と、夏の初戦で波に乗るチームの対戦は、シード校の貫禄と挑戦者の勢いの構図で見応えがある。

千葉商大付は68名の大所帯を抱え、「百花一想」の理念のもと個性を尊重する指導で知られる。吉原拓監督は流通経済大学卒業後に一般企業でサラリーマンを経験し、34歳で通信制大学を受講、36歳で教員免許を取得するという異色の経歴の持ち主。勝敗至上主義に偏らないスポーツマンシップ重視の指導方針を掲げ、低反発バットを用いるリーグ戦形式の大会「Liga Agresiva」にも参加してきた。

同校の甲子園出場は1982年春の第54回選抜のみだが、その時のエースだった平沼定晴は当時「大会屈指の速球派」と評された好投手で、同年のドラフトで中日入り。1986年オフには落合博満を含む4対1の大型トレードでロッテへ移籍し、1989年には清原和博への死球をきっかけにバットを投げつけられる乱闘の当事者となるなど、球界史に名を残す数奇な野球人生を歩んだ。唯一の甲子園出場から半世紀近く、母校が再び聖地を目指す夏がまた巡ってきた。

一方の京葉工は、春の地区予選でコールド負けを喫した悔しさを胸に夏を迎えたチーム。1回戦では白井を8-2の快勝で下し、勢いをつけて2回戦に臨む。工業高校らしい粘り強さで、シード校相手にどこまで食い下がれるかが焦点となる。

投手力・打線ともに厚みを持つ千葉商大付が実力を発揮するか、それとも初戦を快勝で突破した京葉工が上位進出への弾みをつけるか。7月13日の一戦は、シードの重みと挑戦者の勢いがぶつかる好カードとなりそうだ。

硬式野球部は2020年創部と歴史が浅く、2026年4月時点で部員20人という陣容で今大会に臨む。2026年春季千葉県大会では1回戦を突破しており、若いチームが着実に力をつけている。

## 今大会の状況
第108回全国高等学校野球選手権千葉大会は165校148チーム(連合24校7チーム)が参加。7月4日にZOZOマリンスタジアムで開会式が行われ、7月9日から熱戦の火蓋が切られた。決勝は7月26日、ZOZOマリンスタジアムで行われる。

松戸六実・鴨川令徳ともに千葉大会シード校16校には名を連ねておらず、ノーシード同士の対戦。長生の森公園野球場で7月11日11時15分に第2試合として2回戦を戦う。

「チーム全員野球で甲子園を目指す」を理念に掲げ、平日夕方の校内グラウンド練習と休日の練習試合を重ねてきた千葉南。個々の役割を果たしながら困難な場面でも粘り強く戦うプレースタイルをモットーとする。今大会はシード校以外の立場から2回戦に臨む。

## ストーリー・見どころ
Aシードの投手王国と、頭脳で格上を食ってきた公立進学校の対決。東京学館浦安はエース大家雅史を軸にした投手力で今大会もここまで無失点に近い内容を続け、悲願の甲子園初出場へ突き進む。対する検見川は、専用球場すら持たない環境から「1日3試合以上の実戦」で鍛え上げるスタイルで、持てる戦力で私学の強豪を打ち破ってきた公立校の意地が、3回戦の舞台でどう発揮されるかが焦点となる。

東京学館浦安の主役は間違いなく大家雅史だ。2回戦の東京学館戦では2安打無四球7奪三振の完封で自己最速147キロをマーク。9回に入っても球威が落ちない体力とスタミナは、この夏を通しての強みになりそうだ。しかも大家は系列校との対戦に強い。2025年春の「東京学館ダービー」で東京学館船橋を7回1安打無失点に抑え、今大会2回戦でも東京学館を完封。"学館対決キラー"としての顔も持つエースが、今度は検見川打線をどう抑え込むかに注目したい。

一方の検見川は、酒井監督のもとで培われた「考える野球」が持ち味。実戦経験を積み重ねる独自の練習方針は、格上との対戦でこそ真価を発揮してきた。2回戦では松戸馬橋を5-0の完勝で退けており、勢いに乗るチーム状態で3回戦に臨む。

Aシード校の投手力に、実戦で鍛えた公立校の対応力がどこまで食らいつけるか。力の差が数字上は明確な一戦だからこそ、検見川がどんな采配と粘りを見せるかが見どころになる。

## ストーリー・見どころ
甲子園通算39勝で県内トップに立つ古豪・銚子商業と、2000年夏に準優勝を経験した東海大浦安。ノーシードとCシード、立場は異なるが、ともに2回戦を突破して3回戦の舞台に上がってきた両校の対戦は、48年前にすでに一度交わっていた。1978年夏の千葉大会準決勝、当時2年生だった東海大浦安の投手・髙野光は銚子商業の前に敗れベスト4止まり。その髙野はのちに東海大でさらに力をつけ、1983年ドラフト1位でヤクルトに入団する本格派右腕へと成長した。因縁の対決から半世紀近くを経て、今度は令和の3回戦で再びユニフォームを交える。

今大会最大の注目は、何といっても銚子商・中村翠の存在だ。2回戦の多古戦で9回125球、10奪三振、2四球で打者30人を無安打に抑えノーヒットノーランを達成。千葉大会では実に5年ぶりの快挙で、一気にチームの台風の目となった。緩急を織り交ぜる投球とコントロールの良さは、格上との対戦が続く3回戦以降でこそ真価が問われる。ノーシードの銚子商が名門・東海大浦安を相手にどこまで投げ抜けるか、エースの一挙手一投足に注目が集まる。

対する東海大浦安は、向山礼人・小川大輔・森安亮太の上位打線がチームの生命線だ。1番・向山は守備力と出塁力でチャンスの起点を作り、2番・小川はミート力で確実に走者をつなぎ、3番の森安が勝負どころで安打を積み重ねる。3人とも昨年度の秋季大会から安定した活躍を見せてきており、Cシードの看板に恥じない上位打線でノーシードの刺客を迎え撃つ。

ノーヒットノーランの余韻さめやらぬ銚子商業の勢いと、シード校としての貫禄を持つ東海大浦安の上位打線。名門対決に、半世紀近く前の準決勝の記憶が重なる一戦だ。

### 千葉黎明
2024年秋季千葉県大会決勝で拓大紅陵を8-7で下し、初優勝を果たした。続く秋季関東大会でもベスト4に進出し、3年連続出場中だった山梨学院を破ってセンバツ当確をつかむと、第97回選抜大会で悲願の甲子園初出場。初戦では智弁和歌山に0-6で敗れたが、今夏の千葉大会にはBシードとして臨んでいる。

## ストーリー・見どころ
この3回戦は、単なる新カードではない。両校は2025年秋季千葉県大会準々決勝で対戦し、延長11回タイブレークにもつれる死闘を演じた過去がある。9回を終えて2-2、延長に入っても2点ずつ取り合う一進一退の展開の末、木更津総合が吉澤空遵の犠牲フライでサヨナラ勝ちを収めた5-4の激戦は、まだ記憶に新しい。あれからおよそ9か月、センバツ初出場を経てBシードに躍進した千葉黎明と、夏の勢いに乗る木更津総合が再びぶつかる。

指揮官の対比も見どころのひとつだ。千葉黎明の中野大地監督は拓大紅陵OBの捕手で、就任4年目でチームをセンバツ初出場に導いた新世代の指揮官。恩師・小枝守氏の形見のハンカチを胸に戦う姿は、今大会の隠れたテーマになっている。対する木更津総合の五島卓道監督は、暁星国際時代を含め約38年指導する指揮官人生を歩んできたベテランで、「考える野球」を掲げ選手の自主性を重んじる。世代もキャリアも対照的な両監督が、それぞれの哲学でチームを鍛え上げてきた。

さらに掘り下げると、五島監督には見逃せない実績がある。木更津総合に来る以前、暁星国際高校で指導していた時代に、後に日本ハム・巨人・中日で首位打者3回、MVP、アテネ五輪代表となる小笠原道大を、無名の高校生として預かり育てていたのだ。千葉が生んだ球界屈指の好打者の原点に、今夏の対戦相手を率いる指揮官がいたという事実は、木更津総合というチームの奥深さを物語る。

グラウンドに目を向ければ、190cmの長身から多彩な変化球を操る千葉黎明の飯高聖也の投球が軸になる。打線では千葉黎明の4番・佐々木悠晴がセンバツでの経験を糧にどこまで仕掛けられるか。9か月前の死闘を知る両チームだからこそ、一球への集中力は格別なものになるはずだ。

### 県柏
県立柏は千葉県立柏高等学校。甲子園出場歴はない。他部活とのグラウンド共用や学業との両立により練習時間が限られる中、「全員野球」の理念のもと質の高い練習を積み重ねてきた。今大会は非シード校として出発し、2回戦で明聖を9-8で下して3回戦に進出。

### 拓大紅陵
甲子園に春夏合わせて9回出場し、1992年夏には準優勝を果たした千葉屈指の伝統強豪校。最後の甲子園出場は2004年春で、2026年は22年ぶりの聖地奪回を狙う。2025年春季千葉県大会でベスト4に進出し、Aシードを獲得しての臨戦。基本的な生活習慣と人格形成を重視し、文武両道を実践する校風で知られる。

指揮を執るのは坂巻展行監督。同校が甲子園に初出場した1984年春、続く同年夏の主将を務めた人物で、1992年夏の準優勝を含め30年以上チームを率い、U-18日本代表監督も務めた故・小枝守元監督の下で指導者としての礎を築き、2023年秋に監督へ就任した。今大会は2回戦で東海大市原望洋を6-2で下している。
## 今大会の状況

## ストーリー・見どころ
拓大紅陵にとって、夏の「3回戦」は特別な意味を帯びる関門だ。昨夏の第107回選手権千葉大会、Aシードでありながら3回戦で非シードの松戸六実にまさかの2-3敗退。優勝候補の一角と目されながらの金星献上で、夏の3回戦敗退は2019年以来6年ぶりだった。初回に先制機を逃したことが響き、9回二死一・二塁で迎えた一打同点の好機も生かせず、坂巻監督は「先制できていれば」と悔いを口にしている。

今年もAシードとして3回戦に勝ち上がった拓大紅陵の前に立ちはだかるのは、同じく非シードから勝ち上がってきた県柏。昨夏、自分たちの夏を終わらせたのは非シードによるシード食いだった。今年もまた同じ構図が繰り返されるのか、それとも22年ぶりの甲子園へ向けて鬼門を突破するか——拓大紅陵にとって今大会の3回戦は、単なる1試合以上の重みを持つ一戦となる。

対する県柏は、他部活とのグラウンド共用や学業との両立で練習時間が限られる中、「全員野球」を掲げて勝ち上がってきたチームだ。2回戦では明聖相手に9-8の乱打戦を制しており、打線に勢いがある。伝統校・拓大紅陵を相手にどこまで食い下がれるか、非シードならではの思い切りの良さに注目したい。

拓大紅陵の投打二刀流・宮澤和聖も見逃せない存在だ。静岡県伊豆市出身、最速141kmの速球とチェンジアップを操る左腕で、打者としても高いコンタクト力を誇る。県外出身選手として異色の経歴を持つ1年生時からのベンチ入り組が、伝統校の看板を背負ってどんな投球を見せるかも見どころとなる。

昨夏の雪辱を期す拓大紅陵と、勢いに乗る非シードの県柏。ZOZOマリンスタジアムへの道を懸けた3回戦は、伝統と下剋上がぶつかり合う一戦になりそうだ。

### 桐蔭学園
神奈川県の私立高校。野球部は1966年創部。全員全寮制で、関東圏を中心に県外出身選手も多く集まる。小倉丞太郎監督が昨秋に就任し、2026年春季県大会が采配初陣となった。同大会では4年ぶりのベスト8進出を果たし、「伝統の守り勝つ野球」を引き継ぎながらチームを作り上げてきた。甲子園出場は春6回・夏6回の計12回で通算16勝11敗。1971年(昭和46年)夏の選手権では初出場で初優勝を飾った。その後も1984年夏3回戦、1988年春ベスト4、1991年夏3回戦、1999年夏ベスト8、2019年春1回戦と甲子園の舞台を踏んでいるが、最後の出場となった2019年センバツ以降、夏の甲子園から遠ざかっている。今大会は第2シード。

### 大和南

## ストーリー・見どころ
指揮官にとっても特別な夏になる。桐蔭学園を率いる小倉丞太郎監督は同校中学から進んだ生え抜きOBで、高校3年春の第66回選抜(1994年)にエースとして甲子園のマウンドに立った経験を持つ。だが初戦で北陽(大阪)に0-3で敗れ、甲子園はその1試合だけで終わった。教員として約20年にわたりコーチ・部長を務めた後、昨秋に監督へ就任。7月10日の大和南戦は、その小倉監督にとって夏の選手権初采配となる。

チームとしての勢いも申し分ない。桐蔭学園は今春の県大会で4年ぶりのベスト8進出を果たしたが、その3回戦では星槎国際湘南を相手に1-3から逆転し6-5で辛勝している。準々決勝では横浜のエース・織田翔希の前に0-3で屈したものの、苦しい試合を勝ち切る力を証明した春だった。夏はその上積みが問われる。

対する大和南も、粘りの野球で夏を勝ち上がってきたチームだ。昨夏(2025年)の2回戦では7校連合を相手に14-13の乱打戦を制し、9回に途中出場の1年生が右前へサヨナラ打を放って先輩に白星を贈った。その勢いのまま進んだ3回戦では星槎国際湘南に完封負けを喫して夏を終えているが、桐蔭学園が今春に苦しめられた同じ相手だけに、両校の力量を測る一つの物差しにもなる。そして迎えた今夏、大和南は1回戦で市川崎に12-2と圧勝し、再び2回戦の舞台に立った。

第2シードとしての貫禄を示したい桐蔭学園と、公立校ながら勝ち星を積み重ねてきた大和南。27年ぶりの夏の甲子園出場を目指す伝統校と、着実に勝率を上げてきた挑戦者が、7月10日9時、相模原ギオンベースボールパークで対戦する。

### 横浜創学館高等学校

甲子園出場経験はまだない。2026年春季神奈川県大会は決勝で横浜に3-8で敗れ準優勝。2021年夏の第103回選手権神奈川大会でも準優勝を果たしている。秋季県大会優勝1回、夏季県大会準優勝2回、関東大会出場3回と、県内屈指の実力校。「神奈川を制し甲子園で勝つ」を目標に掲げ、技術面のみならず挨拶や礼儀作法といった野球以外の部分にも力を入れる。部員は男子108名、女子マネージャー2名の計110名。ほとんどが県内出身で横浜市南部・横須賀市出身が多く、専用寮を持たず全員が自宅から通学。「地元から愛されるチーム」を掲げる。

### 平塚学園高等学校

1998年の第80回全国高等学校野球選手権大会に出場し、初出場初勝利で九州学院に10-9で勝利、2回戦へ進出した実績を持つ。2026年春季神奈川県大会は3回戦で敗退したが、2024年度秋季大会では3位に入り関東大会に出場。2023年度は春季・夏季・秋季いずれもベスト16に進んでいる。「全国一の激戦区」神奈川に位置する強豪校で、モットーは「日本一」を目指し"「愛されるチーム」「信頼される人間」になる"こと。湘南研修センターを練習拠点に、ウェイトトレーニングとメンタルトレーニングを重視している。

この一戦、両校のベンチに目を向けると共通点が浮かび上がる。横浜創学館を率いる森田誠一監督は横浜高校OBで、指揮官として臨んだ2008年と2021年の夏の決勝、そして2026年春の決勝でも、いずれも母校・横浜の前に涙をのんできた。一方の平塚学園も直近の壁は横浜だ。2013年夏の決勝で0-3の完封負けを喫し、2025年夏の準々決勝では9回2死まで横浜を追い詰めながらサヨナラ負け。両者にとって横浜は幾度となく夏の道を阻んできた存在であり、そこへ挑む前哨戦としてこの2回戦を見る面白さがある。

平塚学園の八木崇文監督の経歴も興味深い。神奈川の法政二高で投手として甲子園を目指した後、三重の津田学園で23歳の若さで監督に就任すると、翌年の選抜でいきなり甲子園初勝利を挙げている。2008年に平塚学園の監督に就任して以来、湘南研修センターを拠点にウェイトとメンタル両面を鍛え上げ、「日本一」を掲げるチームを作り上げてきた。甲子園で勝った経験を持つ指揮官と、指揮官としては甲子園未勝利のまま35年目を迎えるベテラン・森田監督との采配比べも見どころの一つとなる。

平塚学園にとって唯一の甲子園出場である1998年は、神奈川が東西2代表制を敷いた記念大会の年。西神奈川代表として初出場だった。横浜創学館にはNPBのシーズン最多安打記録保持者・秋山翔吾を輩出した歴史もあり、両校とも県内屈指の伝統と実績を積み重ねてきた学校同士の対戦と言える。

投打では横浜創学館の充実ぶりが目を引く。春の準決勝で慶応打線を7回1失点に抑えた2年生右腕・上村怜央、最速145km/hを誇る3年生右腕・稲嶺啓、そして投打二刀流でチームを支える川崎進太朗と、投手陣の層は厚い。打線でも四番を担う高田和音がおり、春季大会で平塚学園に7-0で勝った実績を持つチームがどこまで攻守で圧倒できるか。対する平塚学園は1回戦で高津・横浜旭陵を10-0と圧倒しての勢いを持って乗り込んでくる。両校の力量差を占う意味でも、保土ケ谷球場の一戦は注目に値する。

## 両校プロフィール

### 日大

日本大学高等学校は横浜市港北区にある文武両道の進学校。2025年春季大会で9年ぶりのベスト8進出を果たすと、同年夏の大会でも4回戦で慶應を7回コールドで破りベスト8まで勝ち上がった。秋季大会もベスト16に進出するなど、近年着実に力をつけている。エースの新田力輝投手を中心に、スター選手に頼らず全員で戦うスタイルが持ち味。2026年夏大会はノーシードでの出場となる。

### 松陽

神奈川県立松陽高等学校は横浜市泉区の県立共学校。ロングティーで鍛え上げた打線が武器で、2024年選手権大会では4回戦まで進出した実績を持つ。2025年夏大会は2回戦で横浜翠嵐に3-5で惜敗、秋季地区予選も2勝1敗ながら得失点差で敗退と、あと一歩で上位に届かないシーズンが続く。2026年春季大会は2回戦で慶応藤沢に敗れたが、今大会は1回戦で平塚工科を14-4で下し初戦を突破。2026年夏大会はノーシードでの出場。

## 今大会の状況

## 両校プロフィール
### 立花学園
神奈川県足柄上郡松田町に所在。「打」を看板とするチームで、上位打線の破壊力は県内屈指。部員は男子107名、女子9名を数え、大井総合グラウンドを拠点に月曜休みの週6日体制で汗を流す。指揮を執るのは2017年に30歳の若さで就任した志賀正啓監督。データやSNSを積極活用する革新派で、掲げるスローガンは「革命」。全国制覇を見据えながら、新しい高校野球の形を模索し続けている。近年は2022年夏(第104回選手権神奈川大会)で創部初のベスト4進出を果たすと、同年春もベスト8。2025年秋季大会でもベスト4まで勝ち上がり、前回2025年夏(第107回選手権神奈川大会)はベスト4だった。今大会は第2シード。

### 藤沢清流
神奈川県藤沢市に所在。2010年の学校統合により誕生した比較的新しい公立校。チームスローガンは「清流PRIDE! 〜魂の一球を追いかけて〜」。過去最高成績は2022年夏の第104回選手権神奈川大会でのベスト8で、2023年は3回戦、2024年は4回戦、2025年は3回戦とここ数年は着実に力をつけてきた。2026年はこの過去最高に並ぶベスト8進出を目標に掲げる。なお本校は深沢高校との統合により、2026年夏が現校名で戦う最後の大会。2027年4月からは「藤沢東高校」として新たなスタートを切る予定で、清流の名を背負って戦えるのはこの夏が最後となる。今大会はノーシード。

## 過去の対戦成績
両校は幾度となく対戦を重ねてきた間柄で、なかでも2022年は春夏ともに準々決勝で顔を合わせ、いずれもサヨナラ決着という激闘を演じている。

- **2022年7月22日 第104回選手権神奈川大会準々決勝(横浜スタジアム)**:立花学園 3-2 藤沢清流(延長11回)。1死満塁からフルカウントで高橋琉吉(2番・3年内野手)が右前へ勝ち越し打を放ちサヨナラ勝ち。この試合を制した立花学園は創部初のベスト4進出を決めた。藤沢清流は当時プロ注目の二刀流投手・木島直哉が先発した。
- **2022年4月23日 春季神奈川県大会準々決勝(保土ケ谷球場)**:藤沢清流 4x-3 立花学園。9回裏2死二・三塁から代打・樫山航陽(3年)がサヨナラ打を放ち、藤沢清流が創部初のベスト4進出を果たした。夏の準々決勝は、この春の借りを返す形となった。
- **2020年**:立花学園 11-1 藤沢清流(6回コールド)。
- **2017年7月19日 第99回選手権神奈川大会3回戦(大和球場)**:藤沢清流 0-8 立花学園(7回コールド)。

通算では立花学園が対戦成績で優位に立ち、とりわけ夏の大会では強さを見せている。

第108回全国高等学校野球選手権神奈川大会は7月7日に開幕、決勝は7月26日に予定されている。172チーム(連合5チームを含む)が参加し、組み合わせ抽選は6月13日に行われた。2026年春季県大会の成績により、立花学園は第2シードに位置づけられている一方、藤沢清流はノーシードでの出場。藤沢清流は1回戦(7月7日、小田原球場)で高浜に10-0で快勝し、勢いを持って2回戦に臨む。

## ストーリー・見どころ
第2シードの立花学園と、初戦を大勝で突破したノーシードの藤沢清流が激突する2回戦。立花学園は「打」の看板通り上位打線の破壊力で押し切りたいところで、エース根本奨大が試合をどう作るかが焦点になる。対する藤沢清流は高浜戦の10-0という結果が示す通り、初戦から仕上がりの良さをうかがわせており、勢いそのままに格上に挑む一戦となる。

両校の対戦といえば、2022年の記憶が色濃い。春の準々決勝では藤沢清流が代打・樫山航陽のサヨナラ打で創部初のベスト4をつかみ取ると、その借りを返すように迎えた夏の準々決勝では、延長11回に立花学園の高橋琉吉が値千金の勝ち越し打を放ってサヨナラ勝ち。立花学園にとってもこちらが創部初のベスト4進出だった。あのとき藤沢清流の先発マウンドに立っていたのが、プロ注目の二刀流投手として名を馳せた木島直哉である。同じ年に2度、それぞれの校史に刻まれる白星をサヨナラで分け合った両校が、再びぶつかる。

シードの構図にも面白い変化がある。4年前の2022年夏は公立の藤沢清流が第1シード、立花学園が第2シードという立場だったが、今回はそれが入れ替わり、立花学園が第2シードとして優位に立つ。上位進出校としての重圧を背負う立花学園と、ノーシードから挑む藤沢清流という構図は、あの夏の再現でもあり、逆転の物語でもある。

藤沢清流にとって、この夏には特別な重みがある。深沢高校との統合により、2027年4月からは「藤沢東高校」として新たな一歩を踏み出す予定であり、「藤沢清流」の名を背負って戦えるのはこの夏が最後となる。過去最高のベスト8を、現校名最後の夏に更新できるか。清流の誇りを胸に戦う選手たちの姿は、見る者の心を打つはずだ。

一方の立花学園は、スローガン「革命」を掲げ、全国制覇を見据えて歩みを進めてきたチーム。2025年秋にはベスト4まで勝ち上がっており、その勢いをこの夏にもつなげられるかが問われる。幾度となくサヨナラ劇を演じてきた両校が迎える一戦は、単なる2回戦を超えた意味を持つ、目の離せない試合になりそうだ。

公立校でありながら強豪私学を苦しめる「私学キラー」の異名を持つ。指揮を執るのは三宅裕太監督で、打球方向を予測して守備を誘導する「60度の守備シフト」がチームの武器。2025年春季県大会は湘南工科大学附属に延長10回9-10で惜敗するなど上位校との接戦を演じ、2025年夏季県大会は2回戦で麻溝台に4-3で敗れた。「全員戦力」をテーマに個々の特長を見極めたトレーニングを重ね、今大会はベスト16を目標に掲げる。

## 今大会の状況

第108回全国高等学校野球選手権神奈川大会は172チーム(連合5チーム含む)が参加。7月5日に横浜スタジアムで開会式が行われ、7月7日に開幕した。決勝は7月26日。茅ケ崎北陵・藤沢西とも第1〜第3シード校には入っていないノーシード同士の対戦で、両校とも2回戦からの登場で、この試合が今大会の初戦となる。

## 両校プロフィール
### 鎌倉学園
夏の甲子園出場歴はなく、春の選抜には過去2度出場。1962年の第34回大会でベスト8、1969年の第41回大会は1回戦敗退で、以降は甲子園から遠ざかっている。

直近の実績は2026年春季県大会でベスト16。関東大会を制した横浜と接戦を演じた末に敗れている。2025年秋季県大会は4回戦で東海大相模に2-1で敗退した。竹内智一監督は「全員が喜びや悔しさを共有することでチームは強くなっていく」という方針でチームを率い、部員は87名(2025年度)。学年やポジション別に休養日を設ける一方、朝は基本的に全体練習を行わない。掲げる目標は「甲子園で勝利の校歌を歌うこと」。今大会は第3シード。

### 川崎北
甲子園出場歴はないが、1990年夏にベスト4まで進んだ経験を持つ県立屈指の伝統校。

2026年春季県大会は2回戦で新羽に16-1で快勝したものの、3回戦で橘に10-2で敗れた。夏の大会は7月8日の1回戦で秦野曽屋を13-0で下して2回戦進出を決めている。指揮を執る川村太志監督のもとでは、守備位置ごとのリーダーが主体的に練習メニューを決める組織体制が特徴。部員はスタッフ7名を含む42名で、吹奏楽部やダンス部といった応援団体も充実している。掲げる目標は「夏ベスト4以上」。今大会はシード校外からの挑戦となる。

## 今大会の状況
第3シードの鎌倉学園に対し、川崎北はシード外から白星を重ねて勝ち上がってきた。7月8日の1回戦(中栄信金スタジアム秦野)では秦野曽屋を13-0で圧倒。背番号10の木村が5回1安打無失点と好投し、監督からエース級の評価を受けている。

## ストーリー・見どころ
第3シードの鎌倉学園と、シード外から勢いに乗る川崎北の対戦。川崎北は1回戦で秦野曽屋を13-0の大差で下し、背番号10の木村が5回1安打無失点と圧巻の内容を見せた。監督からエース級の評価を受ける右腕がこのまま波に乗れるかが、まず一つの焦点になる。

指揮官同士の物語にも目を向けたい。太志監督が生まれた1990年こそ、川崎北が夏に史上最高となるベスト4へ進んだ年でもある。当時のエース・河原純一(後に巨人へ進み守護神として活躍)は準々決勝で厚木の川村丈夫(後に横浜)と延長16回、河原240球・川村199球という死闘を演じて投げ勝った、神奈川で語り継がれる一戦だ。「夏ベスト4以上」という現在のチーム目標は、図らずも監督の生まれ年の記録に並ぶことを意味している。

一方、鎌倉学園を率いる竹内智一監督は、卒業後「鎌学に恩返ししたい」と2006年に母校の教員となり、2013年から監督を務める。「甲子園で勝利の校歌を歌うこと」を目標に掲げ、部員同士が喜びも悔しさも分かち合うチームづくりを進めてきた。

両校のOBがプロの世界で交差した過去もある。川崎北の河原純一は2005年から2007年まで西武ライオンズに在籍。鎌倉学園OBで慶大からNPB入りした長田秀一郎も、ちょうど2003年から2013年まで西武でプレーしており、両者が同じユニフォームを着ていた時期が重なる。土台の異なる県立校と私立校が、投打で異なる道を歩みながら同じ舞台にたどり着いていたことになる。

伝統と目標を背負う両校が、夏の等々力球場でどんな試合を見せるのか。1回戦で圧勝劇を演じた川崎北の勢いに、第3シード鎌倉学園がどう対するか注目したい。

## ストーリー・見どころ
甲子園に幾度も出場してきた伝統校・横浜商業と、初戦でシード校を仕留めた荏田。横浜隼人ブロックの2回戦は、格式と勢いがぶつかる一戦となる。Y校は1923年夏に神奈川県勢として初めて甲子園の土を踏み、1983年には春夏連続準優勝を果たした名門だが、1997年春を最後に甲子園から遠ざかって久しい。投手陣の良さに定評のあるチームが、伝統の看板を背負って夏の戦いに臨む。

対する荏田は、7月8日の1回戦で第1シードの慶応藤沢を7-0で下し、大会屈指の金星を挙げてこの試合に駒を進めてきた。掲げる武器は打撃力。「自分たちの打撃を見せる」という姿勢のまま、チームを率いるのは佐藤響一監督。学校公式サイトでは「神奈川県のベスト16クラスのチームに勝利する」ことを目標に掲げており、1回戦の完封勝利はその目標へ向けた確かな一歩といえる。

Y校を率いるのは近年就任した廣濱監督。就任後に迎えた昨2025年夏は、1回戦で横浜栄相手に8回一挙4点を許す逆転負け。12年ぶりの初戦敗退を喫し、「私の力不足」と振り返った。その屈辱を味わったのが昨年の7月10日で、ちょうど1年後となる今年の同じ7月10日に、荏田との一戦を迎える。

荏田にとっても、夏の2回戦は簡単には突破できてこなかった舞台だ。2023年は2回戦で武相に1-8、2025年は初戦を勝ち上がったものの2回戦で横浜に0-16と、いずれも壁にぶつかってきた。今年は1回戦から金星スタートという上々の入り。積み上げてきた打撃力を存分に発揮できれば、目標達成にまた一歩近づく。

伝統の再興を期す横浜商業と、組織づくりの成果を試す荏田。どちらのチームにとっても、この一戦が今後を占う大きな意味を持つ。俣野公園横浜薬大スタジアムでの熱戦に注目したい。

この2回戦は、桐光学園にとって新体制での初陣であると同時に、指揮官・天野喜英監督にとって特別な意味を持つ一戦となる。相模原市出身・在住の天野監督が率いるチームが、対戦するのはまさに監督の地元・相模原の学校。約40年チームを率いた野呂雅之前監督の勇退を受けて就任した新監督が、地元での試合でどんな采配を見せるのか注目したい。

エースで主将の林晃成は、春の準決勝で横浜のエース・織田翔希との投げ合いに競り負け、関東大会出場を逃した悔しさを味わっている。「春はメンタル的に未熟だった」と振り返る右腕が、その経験をどう夏にぶつけるか。最速151km/hの本格派に加え、左腕の鈴木陽仁も控える投手陣は、県内でも屈指の厚み。2012年夏のベスト8以来、14年ぶりの夏の甲子園を目指す桐光学園にとって、この夏は特別な意味を持つ代となる。

打線は4番・周東希虎ら、全国レベルの経験を持つ選手を擁する。春季県大会でベスト4まで勝ち上がった実力は、まさに全国区。

迎え撃つ相模原中等は、中高一貫6年間で培った結束力を武器に、1回戦ではサイエンス相手に10-3の快勝を収めて勢いに乗る。中等教育学校としての甲子園出場実績はまだないが、その一体感を持って第1シードにぶつかっていく。

戦力を見れば下馬評は桐光学園に大きく傾くが、高校野球のトーナメントに絶対はない。新監督の地元凱旋、主将のリベンジ、そして相模原中等の挑戦――保土ケ谷球場でどんなドラマが待っているか、見逃せない一戦だ。

## ストーリー・見どころ
70年近く甲子園から遠ざかる県立の雄・神奈川工業にとって、最も甲子園に近づいた瞬間は1990年夏に訪れている。5回戦で強豪・横浜高校を3-2で撃破する金星を挙げ、そのまま勢いに乗って初の決勝進出。公立校が名門・横浜を倒したこの一戦は、いまも語り継がれる金星のひとつだ。決勝では横浜商業に1-3で敗れたものの、県立校としての誇りを示す夏となった。

2度目の決勝進出は2004年。この年は準決勝で横浜隼人を4-1で下しての勝ち上がりだったが、決勝の相手はのちにプロで活躍する涌井秀章を擁する横浜で、散発3安打に抑え込まれ0-12の完封負けを喫している。2度の決勝、2度とも「横浜」の名を冠するチームに阻まれてきた歴史が、この学校の背負う重みを物語る。

今大会で相まみえる星槎国際湘南を率いるのは、土屋恵三郎監督。1982年秋から桐蔭学園の指揮を執り、甲子園通算10回出場に導いた名将だ。神奈川工業が初めて決勝に進んだ1990年夏、土屋の桐蔭学園は反対ブロックの準決勝まで勝ち上がっていた(横浜商業に1-5で敗退)。もし桐蔭が勝ち上がっていれば、決勝のマウンド上で神奈川工業と土屋が対峙していたかもしれない。あれから36年、今度は星槎国際湘南の指揮官として、土屋と神奈川工業がグラウンドで向き合う。

対する星槎国際湘南の要は、2年生右腕・畑木隼斗だ。公式戦初先発となった1回戦で9奪三振無失点と圧巻の投球を見せ、早くもチームの柱としての存在感を示している。「必笑野球」を掲げる土屋野球と、県立校としての矜持を背負う神奈川工業。異なる哲学を持つ両校が、平塚のマウンドでどんな夏の1ページを刻むか注目したい。

## ストーリー・見どころ
120年近い歴史を刻む県立の名門・横須賀と、共学化してわずか2年目の秀英。伝統で対照的な二校が、大和スタジアムのマウンドを挟んで向き合う。1908年開校の県立第四中学校を前身に持つ横須賀からは小泉純一郎元首相や小柴昌俊氏ら著名なOBを輩出してきた一方、秀英は通信制という枠組みの中で「週1〜5日登校」という独自の学びの形を選んだ生徒たちが白球を追う。

秀英の勢いは1回戦から本物だった。津久井相手に16-9と打ち勝ち、捕手・風間は3安打5打点をマーク。「グラウンドの監督」と呼ばれる存在感で若いチームを牽引し、2年連続の初戦突破に導いた。

対する横須賀は竹谷投手を中心に、昨夏4回戦まで勝ち上がった経験を持つチームで、伝統校の意地を懸けて夏を戦う。小刻みに加点する秀英打線と、経験値で上回る横須賀投手陣との対比も見どころの一つになりそうだ。

秀英の背景には、学園ぐるみのつながりも見え隠れする。同じ大谷学園傘下には今大会第3シードの横浜隼人があり、2024年3月には両校野球部による「大谷学園対決」が実現。秀英は6回まで3-1とリードしながら3-6で逆転を許したが、試合後には横浜隼人側の提案で帽子交換が行われたという。奇しくも横須賀が掲げる校風「自主自律」は、秀英野球部が2026年5月の東北遠征で選手たちが掃除や洗濯を通じて体感したと語る言葉でもあり、対戦する両チームが同じキーワードを掲げている点も興味深い。

伝統の重みを背負う横須賀か、勢いに乗る秀英か。積み重ねてきた歴史も、目指す夏の景色も異なる二校が、2回戦の舞台でどんな試合を見せるか注目したい。

日大藤沢のベンチには、球界史に残る名前が重なる。指揮を執る山本秀明監督は同校のOBで、中日一筋32年・通算219勝を誇る山本昌の実弟。その山本昌本人も2018年から母校の特別臨時コーチとして投手陣に指導の手を差し伸べている。神奈川が生んだ左腕の系譜が、今もベンチとグラウンドをつないでいる格好だ。

一方の桜丘も、神奈川出身の左腕という点で無縁ではない。公立校から亜細亜大を経てプロ入りし、近鉄のエースとして活躍した阿波野秀幸は桜丘の出身。1964年生まれの阿波野と1965年生まれの山本昌、ほぼ同世代の神奈川育ちの左腕を、それぞれ両校が輩出してきたことになる。

グラウンドに目を移せば、桜丘の背番号6・竹沢の存在感が際立つ。1回戦の二宮戦で4⅔イニング無安打無失点というパフォーマンスを見せており、公立校のエースとしてどこまで勝ち上がれるか注目される。対する日大藤沢は、俊足を武器にする池永浩寿らが第2シードの名に恥じない戦いを見せられるか。伝統の公立強豪と第2シード校が相模原ギオンベースボールパークでぶつかる一戦は、見応え十分の好カードとなりそうだ。

1946年創部の伝統校で、文武両道の進学校として知られる。甲子園出場は春夏通算3度。1949年夏の第31回全国大会では初出場ながら全国制覇を達成し、決勝で岐阜県勢を5-3で下した。この優勝を果たした際の監督・佐々木久男は、1年生レギュラーとして出場していた佐々木信也(後のプロ野球選手・野球解説者)の実父だった。以降1951年春、1954年春に出場したのを最後に、甲子園から遠ざかっている。2026年は創部80周年の節目。今大会は2026年春季県大会の成績によりシード校には入らず、3シード以下からの出場となる。

### 港北
神奈川県立高校の硬式野球部。2026年大会はシード校ではない。エース・遠藤幸多朗を中心とした投打の柱がチームを牽引しており、初戦から強烈な結果を残している。

## 今大会の状況
第108回全国高等学校野球選手権神奈川大会は、7月5日に横浜スタジアムで開会式を迎え、7月7日に開幕。172チーム(連合5チーム含む)が出場し、決勝は7月26日に予定されている。湘南・港北ともにシード校には入っておらず、実力伯仲の一戦となる。

7月8日の1回戦、港北は横浜学園と対戦し12-0の7回コールドで快勝。エース遠藤幸多朗が完全試合を達成する圧巻の内容で、初戦を最短で突破した。湘南は2回戦から登場し、7月11日11時30分より藤沢市八部野球場で港北と対戦する。なお会場の八部野球場は藤沢市鵠沼海岸に位置し、湘南高校の所在地(藤沢市鵠沼神明)とは同じ鵠沼エリアの至近距離。地元球場での一戦を迎える。

## ストーリー・見どころ
1949年夏に神奈川県勢として初の全国制覇を成し遂げた古豪・湘南と、初戦から完全試合という強烈なインパクトを残した港北。対照的な歴史を背負う両校が、藤沢市鵠沼の地で相まみえる。

港北の主役は間違いなくエース遠藤幸多朗だ。1回戦の横浜学園戦で記録した7回完全試合は、最速130キロの直球に加え、元プロ投手・押本健彦氏直伝のナックルカーブが冴え渡った結果。さらに見逃せないのが、バッテリーを組む捕手・川口春哉との関係性だ。2人は学童チーム「綱島リバース」時代からの幼なじみで、中学時代に別れた後、港北への進学を誘ったのは川口自身。高校の舞台で再結成された幼なじみバッテリーが、初戦に続いてどこまで通用するかが最大の焦点となる。

迎え撃つ湘南は、1949年夏の全国優勝という輝かしい歴史を持つ文武両道の進学校。今年は創部80周年という節目でもある。打線は4番・中島琥太郎の長打力と、主将で3番の藤原睦久が誇る広角打法が軸。シード校ではない立場から、伝統校としての意地を懸けた戦いに挑む。

会場となる藤沢市八部野球場は、湘南高校の所在地と同じ鵠沼エリアに位置する。地元での一戦となる湘南にとっては、大きな後押しとなる可能性がある一方、初戦で圧巻の完全試合を演じた港北の勢いをどう受け止めるかが試される。伝統と勢い、コンタクト重視の打線と剛速球エース、対照的な魅力がぶつかり合う一戦は、見応え十分の好カードとなりそうだ。

## 両校プロフィール

### 橘
川崎市立橘高等学校。川崎市中原区に所在する市立高校。2026年春季神奈川県大会では2回戦で旭に7-0、3回戦で川崎北に10-2と連勝し、4回戦で第2シードの日大藤沢に0-2で惜敗。2025年秋季大会でも公立校で唯一ベスト8に進出しており、着実に力をつけている。この秋の躍進が評価され、第98回選抜高等学校野球大会の21世紀枠神奈川県推薦校に選出。県高野連から表彰を受けたが、12月の日本高野連発表で全国候補9校には残らなかった。木寺康貴監督(2024年春就任)のもと、「市立プライド」を合言葉に今夏へ挑む。野球部以外では、サッカー日本代表・三笘薫の母校としても知られ、バレーボール部・剣道部もインターハイ・全国大会優勝の実績を持つスポーツ校である。

### 磯子工業
神奈川県立磯子工業高等学校。横浜市磯子区に所在する県立工業高校。迎えた今大会の1回戦(7月8日・俣野公園横浜薬大スタジアム)では横浜立野を12-4で下し、2回戦に進出した。部訓は「本校生の模範となるのが我が野球部である」。グラウンドは両翼95m・センター120m超、ブルペン3カ所を備える。

## 今大会の状況
第108回全国高等学校野球選手権神奈川大会は7月5日に横浜スタジアムで開会式、7日に開幕した172チーム(連合5チーム含む)参加の大会。組み合わせ抽選は6月13日に実施された。橘は春季県大会の成績により第3シードに位置づけられ、1回戦をシード権で突破。磯子工業は非シードから勝ち上がり、7月8日の1回戦で横浜立野に12-4で勝利して2回戦進出を決めた。両者は7月11日9時、川崎市等々力球場で対戦する。等々力球場は橘の所在地と同じ中原区にあり、市立高が市営球場で迎える一戦となる。

## ストーリー・見どころ
橘にとってこの夏は、あと一歩で届かなかった甲子園への再挑戦だ。昨秋、公立校で唯一ベスト8まで勝ち上がった実績が評価され、21世紀枠の県推薦校という栄誉を手にしながら、全国候補への選出は逃した。その悔しさを胸に、第3シードの橘が、今度は自らの足で頂点を目指す。

対する磯子工業は、夏本番で勢いを見せているチームだ。1回戦の横浜立野戦では12得点を挙げる打線の爆発で快勝。この流れのまま迎える2回戦は、まさに正念場となる。

舞台となる等々力球場は、橘にとって自校と同じ川崎市中原区にある事実上のホームグラウンド。市立の看板を背負う橘が、地元の後押しを受けながらどこまで実力を発揮できるかも見どころの一つだ。第3シードの貫禄を見せつけたい橘と、勢いに乗る磯子工業の一戦から、目が離せない。

## ストーリー・見どころ
第1シード・横浜と、シード外ながら公立校の意地を見せる住吉。戦力比較だけを見れば横浜優位は動かないが、トーナメントの怖さはそこにこそある。横浜は春季県大会32連勝、春季関東大会優勝という圧倒的な実績を引っさげ、神奈川県史上初の4季連続甲子園出場という重い目標を背負って3回戦に臨む。

その先頭に立つのが、最速154km/hを誇るエース織田翔希だ。春季関東大会決勝では1安打無失点の投球で胴上げ投手となり、世代No.1右腕の評価を裏付けた。打線でも主将・小野舜友が二刀流としてチームを引っ張り、決勝では先頭打者本塁打を放っている。強肩の遊撃手・池田聖摩や、勝負どころで結果を出す田島陽翔ら、投打に隙のない布陣が今大会も続く。

一方の住吉は、部員31人・未経験者歓迎を掲げる公立校らしい戦い方で勝ち上がってきた。7月9日の湘南台戦では、5回1死満塁という絶体絶命の場面で青木が登板し、2回2/3を無安打無失点に封じる好救援を見せている。同じ試合で「9番・二塁」に公式戦初先発した犬田結羽は、1歳で小児がんを患い左腎臓を摘出、放射線治療の影響で152cmという体格を背負いながらグラウンドに立ち続けてきた選手だ。初先発で記録した1安打1盗塁は、単なる数字以上の重みを持つ。

横浜を率いる村田浩明監督は、大学卒業後に県立霧が丘高で部長を務め、2013年秋からは県立白山高の監督として指揮を執り、2018年夏には北神奈川大会ベスト8に導いた経歴を持つ。かつて「神奈川の県立から甲子園へ」の夢を追った指導者が、今は名門の指揮官として、県立校・住吉と相まみえる巡り合わせでもある。

両校とも初戦ではそろって「湘南」を冠するチームを撃破しての3回戦進出。住吉にとっては、昨年夏に3回戦で涙をのんだ「3回戦の壁」を越えられるかが焦点となる。王者の一角を崩す下剋上が生まれるのか、それとも横浜が予定調和のように駒を進めるのか。7月13日、ひらつかの空の下で答えが出る。

## ストーリー・見どころ
第3シードの三浦学苑と、シード外から白星を重ねてきた旭丘。両者とも1・2回戦を大差で通過しており、勢いだけで見れば互角の3回戦となる。舞台となるバッティングパレス相石スタジアムひらつかは、三浦学苑にとって甲子園初出場へのステップの一つに過ぎないが、旭丘にとっては特別な意味を持つ球場だ。

2024年夏、旭丘は4回戦で当時第3シードだった鎌倉学園を5-2で撃破し、創部26年目で史上初の夏ベスト16進出という快挙を成し遂げた。しかしその快進撃が止まったのが、まさにこの相石スタジアムひらつか。2024年7月18日、横浜に0-11で敗れて夏は終わった。あれから2年、旭丘は再びこの球場で、再び第3シードのチームと相まみえる。翌2025年夏も2回戦で神奈川工業(今年の第3シード校)に2-11で敗れており、旭丘にとって夏の上位シード校との対戦は3年連続となる巡り合わせだ。

両軍の指揮官の経歴にも興味深い共通点がある。三浦学苑の樫平剛監督は英語の教員免許を持ちながら、高校野球の監督になるため日大文理学部に通い直して保健体育の免許を取得した経歴の持ち主。一方の旭丘・平野正貴監督も、大学卒業後に京都両洋高校で非常勤講師を務めながら保健体育の免許を取り直し、指導者への道を切り開いた。ともに遠回りをしてでも母校ではない私学・公立校の監督の座を掴み、長期政権を築いてきた点が重なる。

旭丘にはこの春、三浦学苑の本拠地でもある佐原グラウンドで公式戦を戦った経験もある。4月5日の春季県大会、追浜相手にサヨナラ勝ちを収めた舞台がそこだった。相手のホームグラウンドで結果を残した経験は、今回の対戦に向けても小さな自信になるはずだ。

## ストーリー・見どころ
両校がそろって大差での勝利を飾り、勢いに乗って迎える一戦。茅ケ崎は厚木王子を12-0で、東海大相模は岸根を10-0で退けており、初戦の内容だけを見れば拮抗した好カードとなりそうな組み合わせだ。会場は大和スタジアム。

注目したいのは、東海大相模の主将・安嶋浬久が茅ヶ崎市の出身であるという事実だ。中学時代は湘南ボーイズでプレーし、今回はいわば自らの地元の県立校と対戦する構図となる。堅守巧打の遊撃手として2年時から結果を残してきた安嶋にとって、この一戦は特別な意味を持つはずだ。

その安嶋がショートを継承したのが、昨年のチームで遊撃を守っていた才田和空の後だった。和空は2024年夏の甲子園ベスト8進出の立役者の一人として美技を連発し、卒業後は日本体育大学へ進学。安嶋は「去年のチームには才田さんがいて、チーム全体をみてプレーしていた。自分がショートに入って、才田さんの存在感の大きさを改めて感じた」と語っている。そして今の1番打者・才田凱斗は、その和空の弟にあたる。兄の背中を追う弟と、兄のポジションを継いだ主将が、同じ内外野の軸として今の東海大相模を支えている。

両校が最後に対戦したのは2019年7月17日の神奈川大会3回戦。東海大相模が11-1で快勝し、その勢いのまま決勝で日大藤沢を24-1で下して優勝、甲子園出場をつかんだ夏だった。あれから7年、再びまみえる。

東海大相模は今春の県大会で相洋に敗れ、27年ぶりにノーシードでの選手権突入となった伝統校。一方の茅ケ崎は3番・川村悠葵の快音を足がかりに勝ち上がってきた。地元出身の主将を擁する古豪と、勢いに乗る県立校。大和スタジアムでどちらが次のステージに進むか、注目の一戦だ。

## 両校プロフィール
### 川和
神奈川県立川和高校(横浜市都筑区)。進学校ながら2023年から野球部が急速に台頭し、2025年春季大会でベスト8入り(同校創部初)を達成した。2025年秋季大会はベスト16、同年夏の選手権神奈川大会は5回戦進出と、着実に力をつけている。甲子園出場歴はなし。

2026年夏は第3シードで登場。2回戦で横須賀総合に15-1で快勝(5回コールド)。左腕・片岸が4回1失点の好投を見せた。

「未到への挑戦」をスローガンに掲げ、120m中心フィールドやLED照明付き打撃練習場、Blast・Rapsodeなど最新の分析機器を備える県トップクラスの環境を整備。元プロ選手を含むコーチ陣、専属栄養士、スポーツ心理士も配置し、四国や関東各地からも部員が集まる。2025年のドラフトでは西武ライオンズから育成4位指名を受けた濱岡蒼太(2026年3月卒業)を輩出。学校史上初のNPB指名選手誕生で、目標がより具体的な段階に入っている。

### 武相
武相中学・高等学校(横浜市港北区)は神奈川県の私立中高一貫校。甲子園に4度出場(1964、1965、1967、1968年)した古豪で、通算成績は2勝4敗。1965年夏の鹿児島玉龍戦で聖地初勝利を挙げ、1967・68年は2年連続出場でエース・島野修が投げ抜いた。以来58年、聖地から遠ざかっている。

2024年春季大会では決勝で東海大相模に9-8で競り勝ち、42年ぶりの優勝を達成して関東大会に進出。同年夏の選手権は準決勝で横浜に敗れベスト4、秋はベスト8、2025年春はベスト16と、古豪復活の勢いを保つ。2026年夏はノーシードから出発し、2回戦で中大横浜に10-0で大勝した。

指揮を執る豊田圭史監督は選手を「エリートではなく雑草」と表現し、ボールへの執着と粘り強さを説く「豊田野球」を実践。部員約90人、保護者会約180人が支える体制のもと、3・4番の打力に定評がある。

## ストーリー・見どころ
3回戦での顔合わせは、この春の借りを返そうとする一戦でもある。4月11日、俣野公園で行われた春季大会3回戦では武相・水島が好投しながらも終盤に川和打線につかまり3-1で敗れた。あれから3カ月、両校とも夏の初戦・2回戦を危なげなく突破して再びこの舞台にたどり着いた。

注目は投手戦の行方だ。川和は左腕・片岸が2回戦で4回1失点のコールド勝ちを演出し、武相は水島が5回無失点で中大横浜打線を封じた。力を蓄えた両先発の再登板に注目が集まる。

指揮官の対照も見逃せない。武相を率いる豊田圭史監督は自身も武相OBで、富士大学(岩手)監督時代には10季連続優勝の連盟記録を打ち立て、外崎修汰や多和田真三郎、佐藤龍世ら西武ライオンズ入りした選手を数多く育てた「大学野球の名将」。一方の川和・平野太一監督は津久井浜、瀬谷を経た公立校の教員で、瀬谷時代にドミニカ共和国へ野球研究の渡航をした経験を持ち、横浜国立大学大学院でも指導法を学んだ研究者肌。積み上げてきたキャリアの色が異なる二人の采配が、ベンチワークにも表れそうだ。

川和にとって今夏は、初のNPB指名選手・濱岡蒼太を送り出した直後のシーズンでもある。左腕の看板を引き継ぐように片岸が台頭し、進学校の野球部が築いてきた強化の土台の上に新たな主役が育っている。

対する武相は、42年ぶりの春優勝から続く「古豪復活」の物語の途上にある。かつてのエース・島野修は貧しい家庭から特待生として武相に進み、プロ入り後は阪急・オリックスのマスコット役として18年間スーツアクターを務めた異色のOBで、その半生は道徳の教科書にも採用されたという。「エリートではなく雑草」を掲げる豊田野球の哲学は、こうしたOBの歩みとも重なる。3回戦の相模原ギオンベースボールパークで、両校がどんな決着を刻むか注目したい。

## 両校プロフィール

### 慶応
慶應義塾高等学校(神奈川県横浜市)は1888年創部の伝統校。甲子園出場は春夏通算22回(春7回・夏15回)を数え、優勝は2回。2023年夏には107年ぶりとなる全国制覇を達成し、決勝で仙台育英を8-2で降した。2008年の明治神宮大会優勝、2005年センバツベスト8など実績多数。2026年春季県大会は準々決勝で立花学園に7-4で勝利したものの、準決勝で横浜創学館に1-4で敗れた。ウェイトトレーニングジムなど施設面も充実し、2年生の成長が著しい守備型チームとして今夏の頂点奪還を狙う。監督は森林貴彦氏。

### 大磯
神奈川県立大磯高等学校(神奈川県中郡大磯町)は甲子園出場歴を持たない。2025年夏は1回戦で希望ヶ丘に4-2で勝利し、同年秋は地区予選を突破して県大会1回戦で横浜栄に6-3で勝利するなど、2大会連続で地区予選を突破している。選手の自主性を重んじる「セルフスターター」型のチーム作りを掲げ、湘南エリアのダークホースとして知られる。今夏の目標はベスト32。監督は加藤理志氏。

## 今大会の状況
第108回全国高等学校野球選手権神奈川大会は7月5日に横浜スタジアムで開会式、7月7日に開幕し、決勝は7月26日。172チーム(連合5チーム含む)が参加する。シードは慶応が第1シード、大磯はシード外。両校とも1回戦を突破しており、慶応は7月9日に元石川を10-0(5回コールド、相模原ギオンベースボールパーク)、大磯は同日に平塚農商を12-1(小田原球場)でそれぞれ下している。3回戦は7月13日・14日に組まれており、両校は7月13日9:00開始、サーティーフォー保土ケ谷球場で対戦する。

## ストーリー・見どころ
戦力面では対照的な両校だが、根底に流れる思想には意外な共通項がある。大磯は弾道測定器ラプソードを導入し、球速・回転数・変化量や打球速度・角度といった客観データを練習に反映させている。慶応が掲げる「考える野球」と、大磯が目指す「セルフスターター」な選手像は、規模もアプローチも違いながら、選手自身に考えさせるという一点で響き合う。

マウンドの対決も見どころ。慶応のエース・湯本琢心は最速146キロを誇り、高卒でのプロ入りも視野に入れる注目の右腕左打者。実現すればドラフト制導入以降、慶応の選手としては初のケースとなる。全国屈指の注目選手と、限られた環境で腕を磨いてきた公立校のエースとの投げ合いは、球速差以上のドラマを生む可能性がある。

1回戦をコールドと大量得点でそれぞれ突破した両校が、3回戦のサーティーフォー保土ケ谷球場でどのような試合を見せるか。優勝候補の一角である慶応に対し、湘南のダークホース・大磯がどこまで食い下がるか、注目の一戦だ。

## 両校プロフィール
### 厚木
神奈川県立厚木高校。2026年春季大会は1回戦で鎌倉に2-7で敗れ5回コールド負け。夏の大会は1回戦で光明相模原に3-2の逆転勝ちを収め、2回戦ではサレジオに15-7で快勝。4年連続で3回戦に駒を進めた。16安打を放った打線の勢いが持ち味だ。OBにはいきものがかりの水野良樹がおり、応援歌には同グループの「気まぐれロマンティック」を今大会から初採用している。

### 新羽
神奈川県立新羽高等学校。2026年春季大会は2回戦で川崎北に1-16で7回コールド負け。夏の大会は2回戦で向の岡工業に14-5で勝利し、15安打で乱打戦を制した。3年生は4人と少数ながら、主将でエースの門倉歩夢を中心にチーム一丸となって戦っている。

### 横浜隼人
1977年創部、49年の伝統を持つ野球部。部員124名(高1 38名、高2 38名、高3 48名)を擁する大所帯で、1991年から指揮を執る水谷哲也監督のもとで力をつけてきた。甲子園出場は2009年第91回全国選手権の1回のみだが、初戦で伊万里農林を6-2で下している。2026年は春季県大会でベスト16入りし、その成績により第3シードでの出場。スローガンは「勝志貫徹」。投手陣は田中慶次、原淳平、堀川優太、大沢琉偉、松本悠大と3年生が層をなし、打線は主将・大河原壮人を中心に打力を前面に出す方針を掲げる。

### 横浜商業
通称「Y校」。1923年夏、神奈川県勢として初めて甲子園に出場した古豪で、春のセンバツに9回、夏の選手権に7回出場してきた。最高成績は1983年の春夏連続準優勝。以来甲子園から遠ざかっており、直近の出場は1997年春を最後に約29年が経過している。指揮を執るのは廣濱優監督。横浜商大高から東京情報大へ進み、2016年にY校へ着任。軟式顧問を経て硬式部の副部長・部長を務め、2024年夏大会後に監督へ就任した。第108回大会はノーシードで横浜隼人と同じブロックに入った。

## ストーリー・見どころ
Y校こと横浜商業は、1923年に神奈川県勢として初めて甲子園の土を踏んだ古豪だ。春夏連続準優勝という県史上に残る成績を残した1983年を頂点に、その後は甲子園から遠ざかる時間が続く。最後の夏の甲子園出場は1990年第72回大会。当時は準々決勝まで勝ち上がり、沖縄水産に5-8で敗れている。以来、夏の神奈川代表はすべて私立校が占めてきた歴史があり、Y校にとって甲子園はまさに「悲願」という言葉がふさわしい目標になっている。

その悲願を背負って指揮を執るのが廣濱優監督だ。横浜商大高から東京情報大に進んだ廣濱監督は2016年にY校へ着任し、軟式部の顧問から硬式部の副部長・部長を経て2024年夏の大会後に監督へ就任した。就任からまだ日が浅いが、伝統校ならではの重みを背負いながらチームを率いている。

対する横浜隼人は、2009年に一度だけ甲子園の舞台を経験した学校だ。初戦で伊万里農林を6-2で下した記憶を持つ。あれから10年以上が経過した今も、投手陣の層の厚さは健在で、田中慶次、原淳平、堀川優太、大沢琉偉、松本悠大と3年生投手陣が揃う。主将・大河原壮人の「打力を前面に出し打ち勝っていきたい」という言葉通り、今大会は打撃力も前面に押し出す姿勢を見せている。

Y校のベンチには、もう一つの物語がある。OBの笹川吉康は2020年ドラフト2位でソフトバンクに入団。Y校から実に37年ぶりのプロ入りとなった選手で、2024年の日本シリーズでは初出場・初安打・初盗塁を記録した。Y校主将の松本大誠は「このグラウンドで練習した先輩が大舞台で活躍する姿をみて刺激になった」と語っており、先輩の背中がそのままチームの原動力になっている構図が見える。

3回戦、川崎市等々力球場で相まみえる両校。一度だけ甲子園の土を踏んだ経験を持つ第3シードの横浜隼人と、43年前の輝きを取り戻そうとするノーシードのY校。2021年春には一度対戦し横浜商業が4-1で勝利している。順調に白星を重ねてきた両校がどちらの流れを引き寄せるか、注目の一戦になる。

## 両校プロフィール
### 桐蔭学園
神奈川県の私立校。野球部は1966年創部で、全員全寮制のもと関東圏を中心に県外出身選手も多く集う。甲子園出場は春6回・夏6回の計12回で通算16勝11敗。1971年夏の選手権では初出場で初優勝を飾り、その後も1984年夏3回戦、1988年春ベスト4、1991年夏3回戦、1999年夏ベスト8、2019年春1回戦と甲子園の舞台を踏んできた伝統校。

指揮を執るのは昨秋に就任した小倉丞太郎監督。桐蔭学園OBで、3年時の1994年春にはエースとして第66回センバツに出場したが、初戦で北陽(大阪)に敗れている。東京学芸大へ進学し主戦投手として活躍、社会人では朝日生命、日立製作所でプレー。母校でコーチ・部長を務めた末に監督へ昇格した。その采配で臨んだ2026年春季県大会でベスト8に進出し、4年ぶりの結果を残している。今大会は第2シード。

### 小田原北
2026年4月1日に神奈川県立小田原城北工業高等学校と神奈川県立大井高等学校が統合して誕生した新校。神奈川県小田原市所在の県立高校で、64年の歴史を持つ小田原城北工業の伝統を受け継ぐ。

前身・城北工時代の2024年8月には鎌倉に7-6で勝利し12年ぶりの県大会出場を果たすと、2024年夏季県大会1回戦では霧が丘に6-4で勝利。2025年夏季県大会は大井・小田原城北工業の連合チームとして出場し関東学院に12-0で敗れている。新校としての船出にあたり、野球部は寄付サイトYellzで「新校『小田原北高校』最初の夏へ!」と題したクラウドファンディングを実施し、2026年5月8日に目標金額達成を報告。チーム愛称は「ハイエナ」、前身から受け継ぐ理念は「人間力野球〜人間的成長なくして、野球の進歩なし〜」、スローガンは「一戦必笑」。tvkは開幕前の注目校特集でも小田原北を取り上げた。2026年7月10日の2回戦では横浜翠嵐に5-1で勝利し3回戦進出。

## ストーリー・見どころ
サーティーフォー保土ケ谷球場で迎える3回戦は、通算16勝11敗・全国制覇経験を持つ伝統校と、この春に誕生したばかりの新校が対峙する一戦。桐蔭学園を率いる小倉丞太郎監督は、自身も桐蔭のエースとして1994年センバツのマウンドに立った経験を持つ。その甲子園経験はセンバツ初戦敗退の一度きりだが、教員を経て監督に昇格し、いま夏の選手権では采配者として初めての戦いに臨む。

さらに小倉監督を桐蔭の教員に招いたのは、1971年夏の初出場初優勝を主将・捕手として支えた土屋恵三郎氏。優勝世代の主将が育てた指揮官が、32年越しにマウンドではなくベンチから母校の夏を託される構図は、この試合の裏に流れる大きな物語だ。ベスト8まで勝ち上がった今春の勢いを、夏の大舞台でどこまで持続できるかが注目される。

対する小田原北は、64年の歴史を持つ小田原城北工業と大井高校が統合して生まれたばかりの新校。クラウドファンディングで支援を募り「新校最初の夏」への準備を整えてきた。前身・城北工から受け継ぐ「人間力野球」の理念と「一戦必笑」のスローガンを掲げ、2回戦では横浜翠嵐を5-1で退けて勢いに乗る。

桐蔭学園は棚原ふう・三輪瞳太の継投を軸にした投手陣と、宮本大輝、市村怜温ら春季大会で結果を残した打線が持ち味。対する小田原北は、新校としての一体感と勢いを武器に、伝統校の壁にどう挑むか。歴史と新しさが交わるこの一戦、新チーム「ハイエナ」が大金星を狙えるか、桐蔭学園が実力通りの試合運びを見せるかに注目したい。

### 鎌倉学園
夏の甲子園出場歴はなく、春の選抜には過去2度出場。1962年の第34回大会でベスト8、1969年の第41回大会は1回戦敗退で、以降は甲子園から遠ざかっている。

直近の実績は2026年春季県大会でベスト16。関東大会を制した横浜と接戦を演じた末に敗れた。2025年秋季県大会は4回戦で東海大相模に2-1で敗退している。

指揮を執る竹内智一監督は鎌倉学園OB。高校2年時に監督の勧めでマネジャーに転向し、最後の夏は三塁コーチャーを務めた。早稲田大学では学生コーチとなり、後にヤクルト・メジャーで活躍する青木宣親らと4年間を過ごした人物でもある。卒業後は一度飲料メーカーに就職したが、母校への恩返しを胸に2006年に鎌倉学園の教員に転身し、2013年から監督を務める。「全員が喜びや悔しさを共有することでチームは強くなっていく」という方針でチームを率い、部員は87名(2025年度)。学年やポジション別に休養日を設ける一方、朝は基本的に全体練習を行わない。掲げる目標は「甲子園で勝利の校歌を歌うこと」。今大会は第3シード。

### 相模原城山
2023年4月1日、相模原総合高校と城山高校の統合により開校した新設校。開校初年度の2023年に選手権へ初出場を果たすと、磯子工業に10-0、横浜学園に9-8で勝利し、いきなり2勝を挙げた。神奈川県立校では唯一、野球部専用グラウンドを保有する。開校から今年で4年目、選手権は今夏で4度目の挑戦となる。

## 今大会の状況
第108回全国高等学校野球選手権神奈川大会、鎌倉学園は第3シードとして出場。2回戦は7月10日(金)に川崎市等々力球場で川崎北と対戦し9-2で快勝、3回戦進出を決めた。相模原城山は同日、相模原ギオンベースボールパークで大和西と対戦し8-4で勝利し、3回戦へ駒を進めた。両校は7月14日(火)11時30分、バッティングパレス相石スタジアムひらつかで対戦する。

## ストーリー・見どころ
3回戦としては異例の注目カード。ともに2回戦を快勝で駒を進めた第3シード鎌倉学園と、県立校ながら野球部専用グラウンドを持つ相模原城山が、バッティングパレス相石スタジアムひらつかで相まみえる。

両校には奇妙な符合がある。昨夏2025年7月18日、鎌倉学園は保土ケ谷球場の4回戦で相洋に3-5で敗れた。3-3の同点で迎えた8回に勝ち越しを許しての敗戦だった。同じ7月18日、相模原城山も相模原球場の4回戦で横浜に0-9のコールドで屈している。その横浜はそのまま神奈川を制し、決勝で東海大相模を破って甲子園への切符を掴んだ。同じ日、同じ4回戦の壁の前で夏を終えた両校が、今年はその一歩手前の3回戦で対戦する。勝者だけが、昨年二人が届かなかったステージへの扉に手を掛けることになる。

鎌倉学園は2回戦で川崎北を9-2で退け、勢いそのままに3回戦へ乗り込む。今春も関東大会を制した横浜と最後まで接戦を演じてベスト16まで勝ち上がっており、竹内智一監督が掲げる「全員が喜びや悔しさを共有する」チーム作りが着実に実を結んでいる。夏の甲子園には縁のない古豪が、悲願達成へ着実に歩を進めている格好だ。

一方の相模原城山は、開校からわずか4年の新設校ながら初出場の2023年から2勝を挙げ、着実に力をつけてきた。県立校で唯一という野球部専用グラウンドで鍛えた総合力を武器に、2回戦は大和西を8-4で破って勢いに乗る。歴史の浅さを感じさせない勝負強さで、今夏も甲子園へ続く道を一つずつ切り開いてきた。

伝統と勢い、それぞれ異なる背景を持つ両校が、夏の3回戦という舞台でぶつかり合う。昨夏、同じ壁に阻まれた両者のどちらが先に前へ進むのか、見応えのある一戦になりそうだ。

2018年7月24日、全国高等学校野球選手権北神奈川県大会準々決勝で両校は対戦している。当時の校名は弥栄(現・相模原弥栄)。桐光学園が序盤2回までに7点を奪う猛攻を見せ、弥栄は9回に追い上げを見せたが及ばず、10-7で桐光学園が勝利しベスト4に進出した。会場は桐光学園の今大会2回戦と同じサーティーフォー保土ケ谷球場。当時から相模原弥栄の指揮を執るのは鶴岡英一監督で、8年越しの再戦となる。

## ストーリー・見どころ
第1シード・桐光学園と、シード校を撃破しながら勝ち上がってきた相模原弥栄。8年前の2018年夏、両校は北神奈川大会の準々決勝で相まみえ、桐光学園が10-7で制している。あの試合で弥栄の指揮を執っていたのが、今も相模原弥栄を率いる鶴岡英一監督だ。8年越しの雪辱を果たす舞台が整った。

対する桐光学園を率いるのは、今夏が監督として初陣となる天野喜英監督。40年近くチームを率いた野呂雅之前監督から2025年夏にバトンを受け取った。天野監督自身は相模原市出身・在住で、2001年春の桐光学園初のセンバツ出場時に主将・捕手を務めた経歴を持つ。地元・相模原の球場で、初めての夏に相模原の県立校を迎え撃つという巡り合わせは、この一戦に特別な色を添える。

舞台となる相模原ギオンベースボールパークは、相模原弥栄高校のすぐ隣に位置する球場だ。校名の由来ともなった地名「弥栄」の目の前で戦うことになる相模原弥栄にとっては、事実上のホームゲームと言っていい環境での3回戦となる。

両校とも2回戦は打線が爆発した。桐光学園はエース林晃成が3回1安打無失点6奪三振と圧巻の投球を見せ11-0の完勝、相模原弥栄は12-5の打ち合いを制して勝ち上がった。プロ注目の右腕・林晃成を中心とした桐光学園の投手陣と、丸田右恭を中心とした相模原弥栄打線との真っ向勝負に注目したい。

## 両校プロフィール

### 藤沢翔陵
1973年、当時の藤沢商業として夏の甲子園に出場。1回戦は5-2で勝利、2回戦は0-1で惜敗した甲子園経験校である。近年は2015年秋季県大会でベスト4、2021年には藤沢商時代以来35年ぶりとなるベスト4進出を果たしている。2026年春季県大会の成績により、今大会は第3シードに指定された。

指揮を執るのは同校OBで元プロ野球選手の川俣浩明監督。藤沢商業時代にエースとして活躍後、大阪ガスを経て1996年ドラフト3位で千葉ロッテに入団。一軍29登板を経験するも白星には届かず2002年に引退した。建設会社勤務や学校事務職員を経て教員免許を取得し、2008年に母校教員、2010年から監督に就任。就任5年目の夏、ベンチの選手全員が自分を見ていたことに衝撃を受け、指示待ちの野球から「必要最低限のこと以外は言わない」選手主導の野球へと舵を切った。部の方針は「野球に捧げる情熱ある集団であれ」。

### 鎌倉
神奈川県立鎌倉高等学校。所在地は鎌倉市。スローガンは「鎌高旋風」。破壊力が売りの上位打線を特色とし、冬季にはチームを二分してリーグ戦を実施、打率や盗塁など個人成績にこだわる育成方針を採る。年間50~100試合の練習試合をこなし「文武両道」の実現を重視、目標に掲げるのは県大会4回戦進出だ。

## 過去の対戦成績
平成25年度秋季大会・地区予選では鎌倉0-11藤沢翔陵で藤沢翔陵が勝利。平成27年秋季大会・地区予選も鎌倉0-6藤沢翔陵で藤沢翔陵が制した。近年の対戦は藤沢翔陵が優位に立つ傾向が続く。

第108回全国高等学校野球選手権神奈川大会。2026年春季県大会の成績により、藤沢翔陵は第3シードに指定されている。一方の鎌倉はシードなしの立場から初戦を勝ち上がってきており、3回戦の対象カードはシード校対ノーシード校の一戦となる。3回戦は7月13日・14日に組まれ、対象試合は7月14日11時30分開始予定だ。

藤沢翔陵は2回戦で希望ケ丘に4-0で勝利(7月11日・大和スタジアム)。鎌倉は1回戦で中央農業に12-0で快勝(7月9日・いせはらサンシャイン・スタジアム)、2回戦は相模田名を6-3で下し(7月11日)、3回戦進出を決めた。

## ストーリー・見どころ
対象試合の舞台・川崎市等々力球場は、藤沢翔陵にとって因縁の球場だ。2024年秋季県大会3回戦では強豪・桐光学園を6-2で撃破し、2025年夏の4回戦では当時の第1シード・三浦学苑を7-2で下す金星を挙げた。だが同じ夏の準々決勝、2点リードの展開から立花学園に6回2死満塁で逆転満塁本塁打を浴び、ベスト8で夏を終えている。歓喜と悔しさの両方を刻んだ等々力に、藤沢翔陵は1年ぶりに戻ってくる。

迎え撃つ鎌倉は、シードなしの立場から着実に勝ち上がってきた。1回戦は中央農業に12-0の大差で快勝し、2回戦も相模田名を6-3で下して3回戦進出。「鎌高旋風」を掲げ、冬季リーグ戦で鍛えた上位打線の破壊力を武器に、シード校撃破という下克上を狙う。

藤沢翔陵を率いる川俣浩明監督は、母校のエースから社会人・プロ野球を経験した異色の指揮官だ。監督就任5年目に選手主導の野球へと舵を切った転換は、いまも親川龍真主将を中心としたチーム作りに息づく。チームをまとめる主将のもと、投げては最速135キロの長谷川陽向、打っては1番・指田勇生から続く打線が、シード校の意地を懸ける。

過去の対戦成績では藤沢翔陵が2戦2勝と優位に立つが、いずれも数年前の地区予選レベルでの結果であり、夏の公式戦、しかも3回戦という舞台での対戦は重みが違う。等々力での再起を期す藤沢翔陵と、ノーシードから勢いに乗る鎌倉。シードの威信と下克上への挑戦がぶつかる一戦になる。

## 両校プロフィール

### 草加西
「全員野球」をチームスローガンに掲げ、火曜から日曜まで練習に励む。土日は練習試合も組み、都立高校など県外校との交流も行ってきた。部員は3年生8名、2年生10名、1年生14名の計32名。

近年の大会成績では、令和6年度(2024)全国選手権埼玉大会でベスト32まで進出。令和7年度(2025)夏の全国選手権埼玉大会では3回戦まで駒を進めた。令和8年度(2026)春季大会の地区予選東部地区代表決定戦では春日部に3-10で敗れている。2026年夏大会は1回戦で久喜工業と対戦し、9-1の7回コールドで快勝している。

### 栗橋北彩・日高・新座総合・上尾橘・桶川西
小規模校・野球部員不足という共通の事情を抱える5校が一つのチームを編成した連合。

栗橋北彩高校は埼玉県久喜市に所在し、2010年開校と比較的新しい学校。連合チームでの参加経験を持つ。日高高校(埼玉県立)はグラウンド工事で練習場所が制限されていたが2025年1月に工事が完成し、基礎練習に重点を置きながら県大会出場を目標に活動している。新座総合技術高校は職業高等学校。上尾橘高校は1983年開校。桶川西高校は現在3年生1名、1年生2名という少数精鋭ながら初心者も歓迎し活動を続けており、第37期生で2019年卒の松岡洸希投手が2019年のプロ野球ドラフト会議で埼玉西武ライオンズから3位指名を受け、本校初のプロ野球選手となった。

## 今大会の状況
第108回全国高等学校野球選手権埼玉大会は、7月8日(水)に大宮公園野球場で開会式が行われ、同日13:30から1回戦が始まった。150校139チーム(連合3チーム)が参加し、決勝は7月26日(日)9:45から大宮公園野球場で行われる予定。

草加西は1回戦で久喜工業と対戦し、9-1の7回コールドで勝利して2回戦に進出した。連合(栗橋北彩・日高・新座総合・上尾橘・桶川西)、草加西ともにシード校ではない。

なお、この5校による連合編成は今年の春季地区予選とは異なる顔ぶれで組まれたもの。春は栗橋北彩が東部地区で幸手桜・吉川美南・羽生第一・松伏・三郷工技との6校連合、日高と桶川西が西部地区で川越総合・越生翔桜・小川との連合、新座総合技術が南部地区で志木・浦和東との連合と、それぞれ別々のチームで戦っていた。夏の大会に向けて組み替えが行われ、久喜市・日高市・新座市・上尾市・桶川市という県内広域にまたがる5校が一つの連合を組んでいる。

## ストーリー・見どころ
7月12日の2回戦は、1回戦で久喜工業を7回コールドで下した草加西と、5校の部員が集まって編成された連合の一戦。草加西は「全員野球」を掲げる32名の部員が土日も練習試合を重ねてきたチームで、令和6年度のベスト32、令和7年度の3回戦進出と、ここ数年着実に力をつけてきた。1回戦の9-1コールド勝ちは、その勢いをそのまま持ち込んだ形と言える。

対する連合は、栗橋北彩・日高・新座総合・上尾橘・桶川西という5校が一つのユニフォームに袖を通す。この春の地区予選では、この5校はそれぞれ全く別のチームに所属していた。栗橋北彩は東部地区で6校連合、日高と桶川西は西部地区で別の連合、新座総合技術は南部地区でまた別の連合と、久喜・日高・新座・上尾・桶川という県内各地に散らばっていたメンバーが、夏の大会に向けて一つの連合として組み直された。単独では大会に出場できない部員数の学校同士が、地域を越えて集まって甲子園への切符を目指す、連合チームらしい戦いとなる。

その連合を構成する桶川西は、部員わずか3名という小所帯ながら、球界に強烈な足跡を残すOBを送り出している。松岡洸希投手は2019年のドラフト会議で埼玉西武ライオンズから3位指名を受け、桶川西高校初のプロ野球選手となった。小規模校から羽ばたいた先輩の存在は、少人数で野球を続ける後輩たちにとって大きな支えになっているはずだ。

コールド勝ちで勢いに乗る草加西と、県内各地から集まった選手たちが一体感を試される連合。

### 浦和東
埼玉県さいたま市緑区に位置する県立高校。硬式野球部は少人数ながら積極的に活動を続ける。監督は生田耕平氏。

近年の大会成績は、2025年秋季大会で浦和麗明に敗戦。2025年春季大会は栄東に勝利したのち川口工業に敗退。2023年秋季大会では岩槻商業に23-0で勝利し、2023年夏季大会2回戦では熊谷に6-7で惜敗した。第105回全国高校野球選手権埼玉大会にも出場した記録を持つ。

### 越生翔桜・児玉・小鹿野・深谷・小川
5校による連合チーム。

**越生翔桜高校**は2026年4月1日、越生高校と鳩山高校の統合により新設。今大会が新校名としての初めての夏となる。校名の「翔」は自立・創造を、「桜」は鳩山高校が2018年から生徒発案で続けてきた東日本大震災被災地・福島県産の桜の植樹活動「ハトミライ☆プロジェクト」を継承したもの。旧越生高校野球部は経験者・初心者問わず部員を募り、平日3〜4日、土日に活動していた。

**児玉高校**は埼玉県本庄市児玉町に位置し、2023年に児玉白楊高校と統合。天然芝の野球専用グラウンドを保有する。2024年夏は連合チームとして出場し開幕戦でところざわ商業に0-11で敗戦、2023年夏は国際学院に0-22で敗れている。

**小鹿野高校**は埼玉県秩父郡小鹿野町。両翼86m・ブルペン完備の野球専用グラウンドを持つ。部員は17名(2026年現在、3年生8名・2年生7名・1年生2名)で、顧問4名と外部指導者1名が指導にあたる。モットーは「積善の功 幸あり〜愛される野球部〜」。平成28年には地域大会優勝、県大会ベスト16の実績を持つ。

**深谷高校**は埼玉県深谷市に位置する県立高校。2024年春季大会北部地区予選では自校を含め児玉・上尾橘・桶川西・小川との5校連合で出場しており、児玉とは2024年夏の連合でも同じチームを組んだ間柄。

**小川高校**は埼玉県比企郡小川町。野球部は1989年創部で、練習場所は小川町営・八幡台グラウンド。部員は選手1名・マネージャー1名(2025年7月時点)で、スローガンは「意識」。2024年夏の第106回埼玉大会2回戦では、上尾橘・小川・桶川西の3校連合として大宮武蔵野に3-2でサヨナラ勝ち。これは夏の埼玉大会における連合チーム史上初の勝利で、9回裏1死から決勝打を放ったのは当時の小川高校主将だった。2026年春季大会では川越総合・日高・越生翔桜・桶川西・小川の5校連合として入間向陽に18-5で勝利している。

## ストーリー・見どころ
ノーシードの浦和東と、5校連合チームの対戦。浦和東は「サッカーの名門」として知られる学校だ。ワールドカップ3大会出場のGK川島永嗣をはじめ多数のJリーガーを輩出してきたが、野球部は少人数を貫き、監督・生田耕平氏のもとグラウンドに立ち続けてきた。過去数年の戦績には勝敗が入り混じるが、その中で積み上げてきたチームがどう戦うかが見どころとなる。

相手の連合Cを構成する5校のうち、越生翔桜は今大会が新校名としての初めての夏。2026年4月に越生高校と鳩山高校が統合して誕生した学校で、「桜」の一字には鳩山高校の生徒たちが2018年から続けてきた福島復興桜の植樹活動への思いが込められている。閉校という区切りを経て生まれたチームが、公式戦の舞台に立つ意味は小さくない。

深谷・児玉の両校は、2024年春季大会の北部地区予選では児玉・深谷・上尾橘・桶川西・小川の5校連合で戦った間柄で、児玉と深谷はその後の夏の大会でも共に汗を流してきた。今回の連合Cは、この積み重ねの延長線上にあるチームでもある。

そして連合Cの中でひときわ光るのが小川高校の存在だ。2024年夏、上尾橘・小川・桶川西の3校連合として大宮武蔵野と対戦し、9回裏1死から決勝打を放ってサヨナラ勝ち。これは埼玉大会の夏の舞台における連合チーム史上初の勝利という記録を打ち立てた一戦だった。あの逆転劇を経験した小川高校が、今度は5校連合の一角として浦和東に挑む。

部員1名から十数名まで、規模も背景もさまざまな5校が一つのユニフォームで戦う連合チームと、少人数ながら独自の道のりを歩んできた浦和東。互いに違う背景を持つ両校が、真夏のグラウンドでどんな試合を見せるか注目したい。

Cシードの秀明英光と、一般枠から勝ち上がった鴻巣。組み合わせだけを見れば下馬評は秀明英光に傾く。

秀明英光の攻撃陣は小山、附田、笠原とつながる中軸が軸。1番小山の思い切りのいいフルスイングでチームに勢いをつけ、3番附田、4番笠原へとつなぐ形が理想だ。投げては最速140㌔を誇る右腕エース草津が今夏は投手一本に専念。緩急を操る左腕大矢、けがから復帰した2年生右腕相馬と、継投の駒も揃う。春季大会で花咲徳栄に食い下がった経験が、この夏どこまで生きるか。

## ストーリー・見どころ
Bシードの一角・昌平と、非シードから勝ち上がった川口青陵。両校の対戦は3回戦にして今大会屈指の注目カードとなる。昌平は聖望学園との接戦を5-4で制して勢いに乗り、川口青陵も川口工との激しい打ち合いを9-6で制して初戦を突破。ともに一戦一戦を競り勝ってきた実力校同士の対戦だけに、簡単には決着がつかない展開が予想される。

両校は2023年7月21日、第105回全国高校野球選手権埼玉大会4回戦で対戦しており、その時は昌平が3-2で川口青陵を下している。昌平を率いる岩﨑優一監督は同校OBで、獨協大、三菱重工名古屋での5年間のプレーを経て母校のコーチ・部長を歴任。2023年秋に監督へ就任しており、就任直前の最後の夏に川口青陵との対戦を経験していたことになる。指揮官として初めて川口青陵と相まみえる今回の一戦は、監督にとっても特別な意味を持つ再戦だ。

打線では、捕手・斎藤塁と、中堅手・大倉巧翔が中軸を担う。春季県大会準決勝では斎藤が三塁打を放つなど、パワーで魅せる場面も多い。遊撃の中島航作も聖望学園戦で適時打を放ち、勝利に貢献した。昌平は近年、内野手・櫻井ユウヤが2025年ドラフトで千葉ロッテから4位指名を受けるなど、着実にプロへ選手を送り出しており、その育成力の高さも今夏のチームへの期待につながっている。

甲子園通算7勝を誇る伝統校・上尾と、創部12年で急成長を遂げてきた細田学園。両者の対照的な歴史が交わる一戦となる。上尾は1975年夏、原辰徳を擁する東海大相模を5-4で撃破する死闘を演じた過去を持つ。その栄光を知る野本喜一郎監督の教え子が、現在指揮を執る高野和樹だ。野本は上尾を率いた後、1984年に浦和学院監督に就任し1986年夏に甲子園初出場を果たしたが、開会式当日に急逝し一度も甲子園で指揮を執ることなくその生涯を終えた。浦和学院を全国屈指の強豪に育て上げたのは、その後任として長く指導した森士だ。野本の教えを受けた高野が率いるチームが、今どんな野球を見せるのかは注目に値する。

上尾は2回戦で大宮開成を28-1と圧倒し、シード校の貫禄を示した。4番ファーストの菊池龍希を中心とした強力打線に加え、辻岡瑛人・武田歩の二枚看板を擁する投手陣も充実。守備では坂田奏羽が中盤を締めるなど、隙のない布陣が整っている。

対する細田学園は、2020年秋の関東大会初出場以降、着実に力をつけてきた新興勢力。今夏は2回戦で川越を13-1と圧倒し、勢いに乗って3回戦へと駒を進めた。主将でありチームの精神的支柱でもある福井飛夢は、開会式で全出場校を代表して選手宣誓を任される栄誉を受けている。

伝統と新興、それぞれが2回戦で大差の勝利を収めて臨む今回の3回戦。両チームとも打線の破壊力が際立っており、点の取り合いになる可能性を秘めた一戦だ。

2026年、県内では新設校の話題が相次いだ。市立3校の統合で生まれた川口市立と、県立2校の統合で今年4月に開校したばかりの八潮フロンティア。ともに「統合新設校」という共通の生い立ちを背負いながら、選手権埼玉大会3回戦の舞台で相まみえる。

戦績面では対照的な立場での対戦となる。Dシード校として実績を積んできた川口市立に対し、八潮フロンティアは非シードからの挑戦者。だが初戦の内容を見れば単純な力関係では語れない。川口市立は12-5で危なげなく勝ち上がったが、八潮フロンティアは23-2、5回コールドという大勝で初戦を終えている。シード・非シードの看板を覆すだけの勢いを、開校初年度のチームが見せつけた格好だ。

両校の野球の系譜をたどると、それぞれに名投手の存在が浮かび上がる。八潮フロンティアが野球部を継承した八潮南高校からは、2022年に大ブレイクし2023年WBC日本代表にも選ばれたオリックス・宇田川優希が巣立った。代表内定時には母校が横断幕を掲げて激励したという逸話も残る。一方、川口市立の前身校の一つ・市立川口高校の出身には、沢村賞3回・通算180勝という平成を代表するエース、巨人の斎藤雅樹がいる。統合という同じ道を歩んだ両校が、それぞれ異なる時代の名投手の血脈を受け継いでいると思うと、この一戦の重みが増してくる。

新設校同士、そして対照的な戦い方で初戦を突破した両チーム。3回戦の舞台でどちらが次のステージへの切符を掴むか、注目したい。

## ストーリー・見どころ
7月15日の3回戦の舞台は県営大宮球場。この球場は正式名称を埼玉県営大宮公園野球場といい、実は昨秋の両校対戦の舞台とまったく同じ場所である。2025年秋季埼玉県大会2回戦、埼玉栄が6-3で市川越を振り切ったあの一戦から、わずか9か月半での再戦。同じスタジアムで同じ相手と再び相まみえるという巡り合わせが、この3回戦に特別な重みを与えている。

昨秋のカードでは、当時2年生だった齋藤大冶が市川越の勢いに食らいつかれながらも終盤に逆転を呼び込み、埼玉栄が初戦を突破した。あれから半年以上が経ち、齋藤はエースとして夏の大宮武蔵野戦(7-2)を投げ抜き、伊藤匠汰との二枚看板でチームを3回戦まで導いている。市川越にとっては、あの終盤の悔しさを雪辱する好機が同じグラウンドで巡ってきた格好だ。

市川越は1989年夏に甲子園に立って以来、37年間その舞台から遠ざかっている。2014年夏には決勝まで勝ち上がった実績もあり、公立進学校ながら「平成元年以来」の悲願を胸に部員一丸で努力を重ねてきたチームだ。今年は新座を14-1の7回コールドで下すなど勢いに乗っており、キャプテン橋本健太郎、遊撃手森翔大ら3年生を中心とした打線が主導権を握れるかが焦点になる。

一方の埼玉栄はDシードの看板を背負い、投打の厚みを武器にベスト8進出を狙う。齋藤・伊藤の投手リレーがどこまで市川越打線を封じられるかが試される。同じ球場、同じ相手との再戦という因縁を背景に、両校の意地がぶつかる一戦になりそうだ。

## 両校プロフィール
### 浦和
埼玉県立浦和高校は県内屈指の進学校。甲子園出場は春のセンバツ2回(1935年・1937年)のみで、夏の選手権大会には出場経験がない。1937年を最後に甲子園から遠ざかっている。2026年春季埼玉県大会の地区予選南部地区代表決定戦では浦和北を7-0(7回コールド)で下している。今夏は60年ぶりとなるシード権(Dシード)を獲得している。野球部は小学生向けの野球教室を開くなど地域との交流に積極的で、応援団や吹奏楽部との連携による「スタンドを埋め尽くす大応援」も特色の一つ。OBの大原海輝は東京六大学野球春季リーグでベストナインに初選出された。

### 熊谷工
埼玉県立熊谷工業高校の前身は熊谷商工高等学校で、1966年4月1日に工業各学科が分離して現校名となった。分離前の熊谷商工時代は夏の甲子園でベスト8進出などの記録を残しているが、日本高野連はこれを分離後の熊谷商業側の記録として扱っており、熊谷工業自体としての公式な甲子園出場歴はない。部の特色は、骨や筋肉の発達段階に応じた育成プログラムと、年間100試合程度をこなす豊富な実戦経験。メンタルトレーナーとアスレティックトレーナーを配置し、進路支援にも力を入れる。部のモットーは「球の心は素直なり」で、野球を通じた人間形成を重視している。部員45名、マネージャー1名、顧問3名、コーチ3名の体制。今大会2回戦では狭山清陵を10-0で下した。

## 今大会の状況
第108回全国高等学校野球選手権埼玉大会は150校139チーム(連合3チーム含む)が参加。6月17日に組み合わせ抽選が行われ、7月8日の開会式・開幕戦から7月26日の決勝(大宮公園野球場)まで日程が組まれている。浦和は60年ぶりのDシードとして出場し、7月11日の2回戦で独協埼玉を5-0で下した。シード外の熊谷工は同じ7月11日の2回戦で狭山清陵を10-0で退けている。両校はここまで無失点試合を含む安定した戦いぶりで3回戦に進出した。

## ストーリー・見どころ
浦和対熊谷工は、そろって夏の甲子園経験を持たない県立2校の対戦だ。浦和は春のセンバツこそ戦前に2度経験しているが、夏の選手権には一度も出場したことがない。一方の熊谷工は、前身の熊谷商工時代にベスト8進出の記録を残しながらも、1966年の商工分離によってその記録は熊谷商業側に引き継がれ、熊谷工業としての甲子園出場歴は制度上「ない」ことになっている。私学勢がひしめく埼玉大会にあって、それぞれ異なる形で夏の甲子園に手が届いていない公立2校がぶつかる一戦は、埼玉の高校野球の歴史の陰影を映す対決でもある。

対する浦和は、60年ぶりのシード権を掴んだチーム。2回戦では独協埼玉を5-0で下し、進学校らしい堅実な野球で3回戦にたどり着いた。応援団と吹奏楽部が一体となったスタンドの大応援も、浦和ナインの後押しとなる。

年間100試合規模の実戦を積む熊谷工の勝負強さと、60年ぶりのシードで勢いに乗る浦和の粘り強さ。レジデンシャルスタジアム大宮で公立校同士がどんな夏の1ページを刻むか、注目の3回戦だ。

埼玉県川越市の川越東高校は、埼玉県内では浦和学院に次ぐ115人の部員を抱える進学校。県内外から広く生徒を集め、東大現役合格者を輩出するなど文武両道で知られる。2025年4月には同校OBで兼業米農家の岡田稔基監督(31)が就任。今大会はBシード校として臨み、2回戦で栄東を10-0で下して3回戦へ駒を進めた。

## 今大会の状況
第108回全国高等学校野球選手権埼玉大会は150校139チーム(連合3チーム)が参加。7月8日に大宮公園野球場で開会式が行われ、同日13:30に1回戦が開幕した。決勝は7月26日、同じく大宮公園野球場で行われる。

開智未来は非シード校ながら1回戦・2回戦をいずれも大差で突破し勢いに乗る。一方の川越東はBシード校として着実に白星を重ね、3回戦のレジデンシャルスタジアム大宮に駒を進めた。

## ストーリー・見どころ
上尾のマウンドで対峙するのは、今大会2回戦をともに快勝で突破してきた両校だ。本庄は入間向陽相手に11-3で打ち勝ち、大宮東は不動岡を3-1で退けた。打線でリードした本庄と、投打がかみ合った大宮東。タイプの異なる勝ち上がり方を見せてきた2校が、3回戦という同じ舞台に立つ。

大宮東の背景を語るうえで欠かせないのが、同校OB・北川博敏の存在だ。北川は大宮東時代、3年時に主将を務め、夏の埼玉大会決勝で本塁打を放って同校初の全国選手権出場(1990年夏)に貢献した人物。後にプロ入りし、2001年9月26日には大阪近鉄バファローズの一員として、日本プロ野球史上唯一の「代打逆転サヨナラ満塁優勝決定本塁打」を放ち、近鉄のパ・リーグ優勝を決めた球史に残る一打を刻んでいる。主将としてチームを埼玉大会で勝ち上がらせた男が、のちにプロで語り継がれる一打を放つ。その原点となった舞台に連なる3回戦でもある。

大宮東はプロ野球選手の輩出でも際立つ。1980年の創部以来12人のプロ野球選手を送り出しており、なかでも阪神タイガースへはドラフト2位で平尾博司・北川博敏・吉野誠の3人が指名されている。近年も冨士大和(2024年西武育成1位)、冨士隼斗(2025年ロッテ5位)とプロ入りが続く、県内屈指の「プロ輩出校」でもある。

その伝統校に、公立校らしい勢いで挑むのが本庄だ。春は敗れた相手にも屈することなく夏を戦い抜き、2回戦では11-3の快勝で3回戦の切符を手にした。大宮東はDXハイスクール事業のもとラプソードを用いたデータ分析を練習に取り入れ、日本体育大学との連携で技術指導も受けるなど、伝統と現代的な強化を両立させながらこの夏を戦っている。染谷エル、嶋田蓮、川北康生ら打線の軸に加え、投手陣には岸アンシュ・岸アマルの左右がそろう大宮東と、勢いに乗る本庄。上尾のスタジアムでどちらが夏を掴むか、注目の一戦となる。

2回戦では正智深谷が春日部工業に8-6、栄北が寄居城北に12-2で勝利し、そろって3回戦に駒を進めた。

西武学園文理高等学校は埼玉県狭山市に本拠を置き、硬式野球部は昨夏の第107回埼玉大会でベスト16に進出した実績を持つ。2026年春季大会は1回戦で川口市立に0-7でコールド負けを喫したものの、地区予選では城西大川越を9-2で下している。今夏は1回戦で浦和北に19-4の5回コールド勝ち、2回戦は杉戸に16-4で勝利し3回戦進出を決めた。1、2年生中心の若い投手陣と、3年生を中心に毎回得点を重ねる打線が持ち味。

### 与野
埼玉県立与野高等学校は硬式野球部員49名を擁し、主将・塚原璃久(3年)以下3名の副主将を置く体制でチームを運営する。2026年春季大会は地区予選南部代表決定戦で大宮武蔵野に0-3でコールド負け。2年生大会の大宮与野杯では準決勝で大宮を破り決勝進出も、大宮東に2-4で敗れ準優勝に終わった。今夏は2回戦で熊谷西に10-6で勝利し3回戦へ駒を進めている。

## 今大会の状況
両校とも今大会はノーシードでの勝ち上がり。西武文理は浦和北、杉戸を相手に大量得点で連勝し勢いに乗る。与野も2回戦で熊谷西との打ち合いを制し、初戦を突破した。

1回戦、2回戦とも二桁得点で勝ち上がってきた西武文理の勢いと、僅差の打撃戦を制してきた与野の粘り強さがぶつかる一戦。西武文理は3年生中心の打線が毎回のように得点を重ねる破壊力が武器で、この試合でも早い回からの攻勢が期待される。一方の与野は熊谷西戦で見せた粘りの打撃でどこまで食らいつけるかが鍵。ともにノーシードから勝ち上がってきた両校が3回戦の舞台で真価を問われる。

<script>
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function inline(s){
  s = esc(s);
  s = s.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
  s = s.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g,
    '<a href="$2" target="_blank" rel="noopener">$1</a>');
  s = s.replace(/`([^`]+)`/g, '<span class="tag">$1</span>');
  return s;
}
function youtubeEmbedId(url){
  const m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/shorts\/|youtube\.com\/embed\/)([A-Za-z0-9_-]{11})/);
  return m ? m[1] : null;
}
function mdToHtml(md){
  const lines = md.split("\n");
  let html = "", list = false, table = null, inSources = false, inBroadcast = false, inVideos = false;
  const closeList = ()=>{ if(list){ html+="</ul>"; list=false; } };
  const closeTable = ()=>{
    if(table){
      let t = '<div class="tablewrap"><table>';
      table.forEach((cells,i)=>{
        const tag = i===0 ? "th" : "td";
        t += "<tr>" + cells.map(c=>`<${tag}>${inline(c)}</${tag}>`).join("") + "</tr>";
      });
      html += t + "</table></div>";
      table = null;
    }
  };
  for(const raw of lines){
    const line = raw.trimEnd();
    if(!line.trim()){ closeList(); closeTable(); continue; }
    if(line.startsWith("|")){
      closeList();
      if(/^\|[\s:-]+\|/.test(line.replace(/-/g,"-"))&&/^[\s|:-]+$/.test(line)) continue; // separator row
      const cells = line.replace(/^\||\|$/g,"").split("|").map(c=>c.trim());
      if(!table) table = [];
      table.push(cells);
      continue;
    }
    closeTable();
    if(line.startsWith("# ")){ closeList(); continue; } // redundant H1 title, if the writer added one — page header already shows it
    if(line.startsWith("### ")){ closeList(); html+=`<h3>${inline(line.slice(4))}</h3>`; continue; }
    if(line.startsWith("## ")){
      closeList();
      if(inBroadcast){ html += "</div>"; inBroadcast = false; }
      const t = line.slice(3);
      inSources = (t === "出典");
      inBroadcast = (t === "放送・配信情報");
      inVideos = (t === "関連動画");
      html += h2t(t);
      if(inSources) html += '<div class="sources">';
      if(inBroadcast) html += '<div class="broadcast-box">';
      continue;
    }
    if(line.startsWith("- ")){
      const item = line.slice(2);
      if(inVideos){
        // "[title](url) — note" or "[title](url)" — embed if it's a single YouTube video, else a link card
        const m = item.match(/^\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)\s*(?:—\s*(.*))?$/);
        if(m){
          const [, title, url, note] = m;
          const vid = youtubeEmbedId(url);
          if(vid){
            html += `<div class="video-embed"><div class="video-frame"><iframe src="https://www.youtube-nocookie.com/embed/${vid}" title="${inline(title)}" loading="lazy" allow="accelerometer; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe></div><p class="video-caption"><strong>${inline(title)}</strong>${note ? " — " + inline(note) : ""}</p></div>`;
          } else {
            html += `<div class="video-link-card"><a href="${url}" target="_blank" rel="noopener">${inline(title)}</a>${note ? `<p>${inline(note)}</p>` : ""}</div>`;
          }
          continue;
        }
      }
      if(!list){ html+="<ul>"; list=true; }
      html+=`<li>${inline(item)}</li>`; continue;
    }
    closeList();
    html+=`<p>${inline(line)}</p>`;
  }
  closeList(); closeTable();
  if(inSources) html += "</div>";
  if(inBroadcast) html += "</div>";
  return html;
}

  return `<header class="site"><div class="wrap">
    <div class="site-tag">高校野球 2026 夏</div>
    <h1 class="site-title"><a href="#/" style="text-decoration:none">ミノガセン</a></h1>
    <p class="site-sub">きょう、見逃せない一戦。— 高校野球 観戦ガイド</p>
  </div></header>`;
}
function footerHtml(){
  // 日程・結果の出典は大会configのsources(URL)から生成 — 大会ごとに「大会名=ホスト名」で列挙
  const srcList = Object.values(TOURNAMENTS)
    .map(t => {
      const hosts = (t.sources || []).map(u => { try { return new URL(u).host; } catch(e){ return u; } });
      return hosts.length ? `${esc(t.tname)}=${hosts.map(esc).join("・")}` : null;
